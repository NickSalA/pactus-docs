post:
  summary: Enviar mensaje al chatbot
  description: Envía un mensaje al agente RAG y devuelve la respuesta junto al identificador de conversación.
  operationId: sendChatMessage
  tags:
    - Chatbot
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: 'schemas/schema.yaml#/ChatRequest'
  responses:
    '200':
      description: Respuesta exitosa.
      content:
        application/json:
          schema:
            $ref: 'schemas/schema.yaml#/ChatResponse'
    '401':
      description: No autenticado.
      content:
        application/json:
          schema:
            $ref: '../../schemas/errors.yaml#/ErrorResponse'
    '422':
      description: Datos de entrada inválidos.
      content:
        application/json:
          schema:
            $ref: '../../schemas/errors.yaml#/ValidationError'
