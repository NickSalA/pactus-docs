ChatRequest:
  type: object
  required:
    - message
  properties:
    message:
      type: string
      description: Mensaje del usuario para el chatbot.
      example: Resume mis contratos activos.
    thread_id:
      type: integer
      nullable: true
      description: ID de la conversación existente. Si se omite, el backend crea una nueva conversación.
      example: 12

ChatResponse:
  type: object
  required:
    - response
    - thread_id
  properties:
    response:
      type: string
      description: Respuesta generada por el chatbot.
    thread_id:
      type: integer
      description: ID de la conversación.
      example: 12
    chart:
      $ref: '../../conversations/schemas/schema.yaml#/ChartData'
