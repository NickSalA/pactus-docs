UserRole:
  type: string
  enum:
    - SUPERADMIN
    - ADMIN
    - HR
    - MANAGER
    - WORKER

UserResponse:
  type: object
  properties:
    id:
      type: integer
    organization_id:
      type: integer
    supabase_user_id:
      type: string
      format: uuid
      nullable: true
    email:
      type: string
      format: email
    full_name:
      type: string
      nullable: true
    avatar_url:
      type: string
      nullable: true
    role:
      $ref: '#/UserRole'
    receives_notifications:
      type: boolean
    is_active:
      type: boolean
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
  required:
    - id
    - organization_id
    - email
    - role
    - receives_notifications
    - is_active
    - created_at
    - updated_at

CurrentUserResponse:
  $ref: '#/UserResponse'