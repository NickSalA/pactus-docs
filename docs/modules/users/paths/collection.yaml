post:
  summary: Crear un nuevo usuario
  description: Permite crear un nuevo usuario proporcionando email, contraseña y rol.
  operationId: createUser
  tags: 
    - Usuarios
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../users/schemas/schema.yaml#/UserCreateRequest'
  responses:
    '201':
      description: Usuario creado
      content:
        application/json:
          schema:
            $ref: '../../users/schemas/schema.yaml#/UserResponse'
    '400':
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ValidationError'

get:
  summary: Listar usuarios existentes
  description: Retrieves a list of all users
  operationId: listUsers
  tags:
    - Usuarios
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../../users/schemas/schema.yaml#/UserListResponse'
          examples:
            twoUsers:
              summary: Ejemplo con dos usuarios
              value:
                - id: 14
                  email: ana@example.com
                  role: admin
                - id: 15
                  email: dev@example.com
                  role: user

    '404':
      description: No users found
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/NotFoundError'