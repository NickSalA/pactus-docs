parameters:
  - name: user_id
    in: path
    required: true
    schema:
      type: integer
    description: Identificador del usuario cuyas conversaciones se consultan.

get:
  summary: Obtener conversaciones de un usuario específico
  description: Devuelve las conversaciones del usuario autenticado cuando el `user_id` coincide con su identidad.
  operationId: listUserConversations
  tags:
    - Conversaciones
  responses:
    '200':
      description: Conversaciones obtenidas satisfactoriamente.
      content:
        application/json:
          schema:
            $ref: '../schemas/schema.yaml#/ConversationListResponse'
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/AuthenticationError'
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ForbiddenError'
