get:
  summary: Listar conversaciones del usuario autenticado
  description: Lista las conversaciones del usuario autenticado, ordenadas por actividad reciente.
  operationId: listConversations
  tags:
    - Conversaciones
  responses:
    '200':
      description: Conversaciones obtenidas satisfactoriamente.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../schemas/schema.yaml#/ConversationList'
    '401':
      description: No autenticado.
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ErrorResponse'
    '500':
      description: Error interno al listar conversaciones.
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/InternalServerError'
    '503':
      description: Persistencia de conversaciones no disponible.
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ServiceUnavailableError'

post:
  summary: Crear una conversación
  description: Crea una conversación vacía para el usuario autenticado.
  operationId: createConversation
  tags:
    - Conversaciones
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/schema.yaml#/ConversationCreateRequest'
  responses:
    '201':
      description: Conversación creada satisfactoriamente.
      content:
        application/json:
          schema:
            $ref: '../schemas/schema.yaml#/ConversationRead'
    '401':
      description: No autenticado.
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ErrorResponse'
    '409':
      description: Conflicto al crear la conversación.
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ErrorResponse'
    '500':
      description: Error interno al crear la conversación.
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/InternalServerError'
    '503':
      description: Persistencia de conversaciones no disponible.
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ServiceUnavailableError'
    '422':
      description: Datos inválidos.
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ValidationError'
