ConversationMessage:
  type: object
  properties:
    role:
      type: string
      enum:
        - user
        - bot
    content:
      type: string
    chart:
      $ref: '#/ChartData'

    timestamp:
      type: string
      format: date-time
  required:
    - role
    - content
    - timestamp

ChartData:
  type: object
  properties:
    type:
      type: string
      enum:
        - bar
        - line
        - pie
    layout:
      type: string
      enum:
        - vertical
        - horizontal
        - centric
    title:
      type: string
    config:
      type: object
      properties:
        categoryKey:
          type: string
        series:
          type: array
          items:
            type: object
            properties:
              dataKey:
                type: string
              name:
                type: string
              color:
                type: string
            required:
              - dataKey
              - name
      required:
        - categoryKey
        - series
    data:
      type: array
      description: |
        Arreglo de objetos con llaves dinámicas en inglés. El contenido dependerá de la consulta:
        * Top Servicios por Monto: { "name": string, "value": number }
        * Concentración Contratos/Mes: { "month": string, "contracts": number }
        * Valor Promedio (Multi-serie): { "month": string, "[serviceName]": number }
        * Concentración de Ingresos (Pie): { "name": string, "value": number }
        * Concentración de Ingresos (Barras): { "name": string, "percentage": number }
      items:
        type: object
        additionalProperties:
          anyOf:
            - type: string
            - type: number
  required:
    - type
    - layout
    - title
    - config
    - data


ConversationCreateRequest:
  type: objecto
  properties:
    title:
      type: string
      minLength: 1
      pattern: '.*\S.*'
      description: Título de la conversación. No puede estar vacío y el backend recorta espacios externos.
  required:
    - title

ConversationUpdateRequest:
  type: object
  properties:
    title:
      type: string
      minLength: 1
      pattern: '.*\S.*'
      description: Nuevo título de la conversación. No puede estar vacío y el backend recorta espacios externos.
  required:
    - title

ConversationRead:
  type: object
  properties:
    id:
      type: integer
    title:
      type: string
    organization_id:
      type: integer
    user_id:
      type: integer
    content:
      type: array
      items:
        $ref: "#/ConversationMessage"
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
  required:
    - id
    - title
    - organization_id
    - user_id
    - content
    - created_at
    - updated_at

ConversationList:
  type: object
  properties:
    id:
      type: integer
    title:
      type: string
    organization_id:
      type: integer
    user_id:
      type: integer
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
  required:
    - id
    - title
    - organization_id
    - user_id
    - created_at
    - updated_at

ConversationResponse:
  $ref: "#/ConversationRead"

ConversationListResponse:
  type: array
  items:
    $ref: "#/ConversationList"
