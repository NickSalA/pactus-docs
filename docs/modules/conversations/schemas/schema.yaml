ConversationResponse:
  type: object
  properties:
    id:
      type: integer
      example: 1
    title:
      type: string
      example: Conversación sobre contrato de arrendamiento
    created_at:
      type: string
      format: date-time
      example: '2024-01-01T12:00:00Z'
    content:
      type: array
      items:
        type: object
        properties:
          sender:
            type: string
            enum: [user, bot]
            example: user
          message:
            type: string
            example: "¿Cuáles son las cláusulas principales del contrato?"

ConversationListResponse:
  type: array
  items:
    type: object
    properties:
      id:
        type: integer
        example: 1
      title:
        type: string
        example: Conversación sobre contrato de arrendamiento
      created_at:
        type: string
        format: date-time
        example: '2024-01-01T12:00:00Z'
