ConversationMessage:
  type: object
  properties:
    role:
      type: string
      enum:
        - user
        - bot
    content:
      type: string
    timestamp:
      type: string
      format: date-time
  required:
    - role
    - content
    - timestamp



ConversationRead:
  type: object
  properties:
    id:
      type: integer
    title:
      type: string
    organization_id:
      type: integer
    user_id:
      type: integer
    content:
      type: array
      items:
        $ref: '#/ConversationMessage'
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
  required:
    - id
    - title
    - organization_id
    - user_id
    - content
    - created_at
    - updated_at

ConversationList:
  type: object
  properties:
    id:
      type: integer
    title:
      type: string
    organization_id:
      type: integer
    user_id:
      type: integer
    created_at:
      type: string
      format: date-time
  required:
    - id
    - title
    - organization_id
    - user_id
    - created_at

ConversationResponse:
  $ref: '#/ConversationRead'

ConversationListResponse:
  type: array
  items:
    $ref: '#/ConversationList'
