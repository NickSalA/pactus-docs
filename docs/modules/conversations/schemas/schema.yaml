ConversationMessage:
  type: object
  properties:
    role:
      type: string
      enum:
        - user
        - assistant
    content:
      type: string
    timestamp:
      type: string
      format: date-time
  required:
    - role
    - content
    - timestamp

ConversationCreateRequest:
  type: object
  properties:
    title:
      type: string
      minLength: 1
      pattern: '.*\S.*'
      description: Título de la conversación. No puede estar vacío y el backend recorta espacios externos.
  required:
    - title

ConversationUpdateRequest:
  type: object
  properties:
    title:
      type: string
      minLength: 1
      pattern: '.*\S.*'
      description: Nuevo título de la conversación. No puede estar vacío y el backend recorta espacios externos.
  required:
    - title

ConversationRead:
  type: object
  properties:
    id:
      type: integer
    title:
      type: string
    organization_id:
      type: integer
    user_id:
      type: integer
    content:
      type: array
      items:
        $ref: '#/ConversationMessage'
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
  required:
    - id
    - title
    - organization_id
    - user_id
    - content
    - created_at
    - updated_at

ConversationList:
  type: object
  properties:
    id:
      type: integer
    title:
      type: string
    organization_id:
      type: integer
    user_id:
      type: integer
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
  required:
    - id
    - title
    - organization_id
    - user_id
    - created_at
    - updated_at

ConversationResponse:
  $ref: '#/ConversationRead'

ConversationListResponse:
  type: array
  items:
    $ref: '#/ConversationList'
