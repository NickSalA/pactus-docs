OrganizationResponse:
  type: object
  properties:
    id:
      type: integer
    name:
      type: string
    is_active:
      type: boolean
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
    ruc:
      type: string
      nullable: true
    address:
      type: string
      nullable: true
    company_type:
      type: string
      nullable: true
    objeto_social:
      type: string
      nullable: true
    legal_rep_name:
      type: string
      nullable: true
    legal_rep_dni:
      type: string
      nullable: true
    jurisdiction:
      type: string
      nullable: true
    city:
      type: string
      nullable: true
    autorizacion_entidad:
      type: string
      nullable: true
    autorizacion_fecha:
      type: string
      format: date
      nullable: true
    autorizacion_emitida_por:
      type: string
      nullable: true
    email:
      type: string
      format: email
      nullable: true
    phone:
      type: string
      nullable: true
  required:
    - id
    - name
    - is_active
    - created_at
    - updated_at

OrganizationCreateRequest:
  type: object
  properties:
    name:
      type: string
    ruc:
      type: string
      nullable: true
    address:
      type: string
      nullable: true
    company_type:
      type: string
      nullable: true
    objeto_social:
      type: string
      nullable: true
    legal_rep_name:
      type: string
      nullable: true
    legal_rep_dni:
      type: string
      nullable: true
    jurisdiction:
      type: string
      nullable: true
    city:
      type: string
      nullable: true
    autorizacion_entidad:
      type: string
      nullable: true
    autorizacion_fecha:
      type: string
      format: date
      nullable: true
    autorizacion_emitida_por:
      type: string
      nullable: true
    email:
      type: string
      format: email
      nullable: true
    phone:
      type: string
      nullable: true
  required:
    - name

OrganizationUpdateRequest:
  type: object
  properties:
    name:
      type: string
      nullable: true
    is_active:
      type: boolean
      nullable: true
    ruc:
      type: string
      nullable: true
    address:
      type: string
      nullable: true
    company_type:
      type: string
      nullable: true
    objeto_social:
      type: string
      nullable: true
    legal_rep_name:
      type: string
      nullable: true
    legal_rep_dni:
      type: string
      nullable: true
    jurisdiction:
      type: string
      nullable: true
    city:
      type: string
      nullable: true
    autorizacion_entidad:
      type: string
      nullable: true
    autorizacion_fecha:
      type: string
      format: date
      nullable: true
    autorizacion_emitida_por:
      type: string
      nullable: true
    email:
      type: string
      format: email
      nullable: true
    phone:
      type: string
      nullable: true

OrganizationListResponse:
  type: array
  items:
    $ref: '#/OrganizationResponse'

OrganizationMemberCreateRequest:
  type: object
  properties:
    email:
      type: string
      format: email
    role:
      $ref: '../../users/schemas/schema.yaml#/UserRole'
  required:
    - email
    - role

OrganizationMemberRoleUpdateRequest:
  type: object
  properties:
    role:
      $ref: '../../users/schemas/schema.yaml#/UserRole'
  required:
    - role

OrganizationMemberNotificationsUpdateRequest:
  type: object
  properties:
    receives_notifications:
      type: boolean
  required:
    - receives_notifications

OrganizationMemberResponse:
  $ref: '../../users/schemas/schema.yaml#/UserResponse'

OrganizationMemberListResponse:
  type: array
  items:
    $ref: '#/OrganizationMemberResponse'
