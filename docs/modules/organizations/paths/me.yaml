get:
  summary: Obtener mi organización
  description: Obtiene la organización asociada al usuario ADMIN autenticado. SUPERADMIN no usa este endpoint para gestión global.
  operationId: getMyOrganization
  tags:
    - Organizaciones
  responses:
    '200':
      description: Organización obtenida satisfactoriamente.
      content:
        application/json:
          schema:
            $ref: '../schemas/schema.yaml#/OrganizationResponse'
    '401':
      description: No autenticado.
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ErrorResponse'
    '403':
      description: No autorizado. Se requiere rol ADMIN.
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ForbiddenError'
    '404':
      description: Organización no encontrada.
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/NotFoundError'

patch:
  summary: Actualizar mi organización
  description: Actualiza la organización asociada al usuario ADMIN autenticado.
  operationId: updateMyOrganization
  tags:
    - Organizaciones
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/schema.yaml#/OrganizationUpdateRequest'
  responses:
    '200':
      description: Organización actualizada satisfactoriamente.
      content:
        application/json:
          schema:
            $ref: '../schemas/schema.yaml#/OrganizationResponse'
    '400':
      description: Datos inválidos, nombre duplicado o RUC duplicado.
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ErrorResponse'
    '401':
      description: No autenticado.
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ErrorResponse'
    '403':
      description: No autorizado. Se requiere rol ADMIN.
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ForbiddenError'
    '404':
      description: Organización no encontrada.
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/NotFoundError'
