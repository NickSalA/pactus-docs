parameters:
  - name: member_id
    in: path
    required: true
    schema:
      type: integer
    description: Identificador del miembro.

patch:
  tags:
    - Organizaciones
  summary: Actualizar el rol de un miembro
  operationId: updateOrganizationMemberRole
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/schema.yaml#/OrganizationMemberRoleUpdateRequest'
  responses:
    '200':
      description: Rol actualizado correctamente.
      content:
        application/json:
          schema:
            $ref: '../schemas/schema.yaml#/OrganizationMemberResponse'
    '404':
      description: Member Not Found
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/NotFoundError'
