TokenUsageRead:
  type: object
  properties:
    id:
      type: integer
    conversation_id:
      type: integer
    message_index:
      type: integer
    input_tokens:
      type: integer
    output_tokens:
      type: integer
    total_tokens:
      type: integer
    input_cost_usd:
      type: number
      format: decimal
    output_cost_usd:
      type: number
      format: decimal
    total_cost_usd:
      type: number
      format: decimal
    model_used:
      type: string
    created_at:
      type: string
      format: date-time

UsageSummary:
  type: object
  properties:
    total_input_tokens:
      type: integer
    total_output_tokens:
      type: integer
    total_tokens:
      type: integer
    total_input_cost_usd:
      type: number
      format: decimal
    total_output_cost_usd:
      type: number
      format: decimal
    total_cost_usd:
      type: number
      format: decimal
    usage_count:
      type: integer
