get:
  summary: Obtener uso de tokens por conversación
  description: Devuelve el historial de uso de tokens para una conversación específica del chatbot.
  operationId: getConversationUsage
  tags:
    - Chatbot
  parameters:
    - name: conversation_id
      in: path
      required: true
      schema:
        type: integer
      description: ID de la conversación.
  responses:
    '200':
      description: Uso obtenido satisfactoriamente.
      content:
        application/json:
          schema:
            $ref: '../schemas/schema.yaml#/ConversationUsage'
    '401':
      description: No autenticado.
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ErrorResponse'
    '404':
      description: Conversación no encontrada.
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ErrorResponse'