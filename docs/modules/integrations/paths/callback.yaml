get:
  tags:
    - Integraciones
  summary: Intercambiar código de Google por tokens (Legacy)
  operationId: exchangeDriveCode
  description: Flujo OAuth tradicional. El frontend actual usa Google Picker API con Google Identity Services. Este endpoint se mantiene por compatibilidad.
  parameters:
    - name: code
      in: query
      required: true
      schema:
        type: string
  responses:
    '200':
      description: Tokens obtenidos con éxito.
      content:
        application/json:
          schema:
            $ref: '../schemas/schema.yaml#/TokenResponse'
    '422':
      description: Parámetros inválidos.
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ValidationError'
