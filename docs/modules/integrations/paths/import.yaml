post:
  tags:
    - Integraciones
  summary: Importar archivos de Google Drive en segundo plano
  operationId: importDriveFiles
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/schema.yaml#/ImportRequest'
  responses:
    '200':
      description: Importación iniciada.
      content:
        application/json:
          schema:
            $ref: '../schemas/schema.yaml#/ImportResponse'
    '401':
      description: No autenticado.
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ErrorResponse'
    '403':
      description: No tiene permisos para importar este tipo de contrato.
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ForbiddenError'
    '422':
      description: Datos inválidos.
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ValidationError'
    '409':
      description: Ya existe una importación en progreso. Espere a que termine.
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ConflictError'
