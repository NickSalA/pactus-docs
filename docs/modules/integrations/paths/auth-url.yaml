get:
  tags:
    - Integraciones
  summary: Obtener URL de autorización de Google Drive.
  operationId: getDriveAuthUrl
  responses:
    '200':
      description: URL generada con éxito.
      content:
        application/json:
          schema:
            $ref: '../schemas/schema.yaml#/AuthURLResponse'
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/AuthenticationError'
