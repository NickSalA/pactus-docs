AuthURLResponse:
  type: object
  properties:
    url:
      type: string
      format: uri
  required:
    - url

TokenResponse:
  type: object
  properties:
    token:
      type: string
    refresh_token:
      type: string
      nullable: true
    token_uri:
      type: string
    client_id:
      type: string
    client_secret:
      type: string
    scopes:
      type: array
      items:
        type: string
  required:
    - token
    - refresh_token
    - token_uri
    - client_id
    - client_secret
    - scopes

DriveRequest:
  type: object
  properties:
    token:
      type: object
      additionalProperties: true
  required:
    - token

DriveImportFile:
  type: object
  properties:
    file_id:
      type: string
      minLength: 1
    document:
      $ref: '../../documents/schemas/schema.yaml#/CreateDocumentDraftRequest'
      description: Metadata de creación alineada al endpoint de documentos. Puede incluir `contract_type`, `company_contract` o `labor_contract`.
  required:
    - file_id
  example:
    file_id: google-drive-file-id
    document:
      contract_type: COMPANY
      company_contract:
        client: Acme S.A.C.
        ruc: '20600000001'
      form_data:
        value: 1200
        currency: PEN

ImportRequest:
  type: object
  properties:
    token:
      type: object
      additionalProperties: true
    files:
      type: array
      minItems: 1
      items:
        $ref: '#/DriveImportFile'
  required:
    - token
    - files

ImportResponse:
  type: object
  properties:
    message:
      type: string
    queued_files:
      type: integer
    index_name:
      type: string
  required:
    - message
    - queued_files
    - index_name
