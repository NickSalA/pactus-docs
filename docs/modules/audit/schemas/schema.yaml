UserActivityAction:
  type: string
  enum:
    - CREATED
    - UPDATED
    - DELETED

ChatbotActivityAction:
  type: string
  enum:
    - CONVERSATION_STARTED
    - MESSAGE_SENT
    - RESPONSE_GENERATED

UserActivityResponse:
  type: object
  properties:
    id:
      type: integer
    organization_id:
      type: integer
    actor_user_id:
      type: integer
    actor_name:
      type: string
      nullable: true
    actor_role:
      type: string
    action:
      $ref: '#/UserActivityAction'
    target_user_id:
      type: integer
      nullable: true
    target_user_email:
      type: string
      format: email
      nullable: true
    target_user_name:
      type: string
      nullable: true
    previous_role:
      type: string
      nullable: true
    role:
      type: string
      nullable: true
    created_at:
      type: string
      format: date-time
  required:
    - id
    - organization_id
    - actor_user_id
    - actor_role
    - action
    - created_at

UserActivityListResponse:
  type: array
  items:
    $ref: '#/UserActivityResponse'

ChatbotActivityResponse:
  type: object
  properties:
    id:
      type: integer
    organization_id:
      type: integer
    actor_user_id:
      type: integer
    actor_name:
      type: string
      nullable: true
    actor_role:
      type: string
    action:
      $ref: '#/ChatbotActivityAction'
    conversation_id:
      type: integer
      nullable: true
    input_tokens:
      type: integer
      nullable: true
    output_tokens:
      type: integer
      nullable: true
    total_tokens:
      type: integer
      nullable: true
    input_cost_usd:
      type: number
      format: decimal
      nullable: true
    output_cost_usd:
      type: number
      format: decimal
      nullable: true
    total_cost_usd:
      type: number
      format: decimal
      nullable: true
    model_used:
      type: string
      nullable: true
    created_at:
      type: string
      format: date-time
  required:
    - id
    - organization_id
    - actor_user_id
    - actor_role
    - action
    - created_at

ChatbotActivityListResponse:
  type: array
  items:
    $ref: '#/ChatbotActivityResponse'
