NotificationType:
  type: string
  enum:
    - critical
    - warning
    - info

NotificationResponse:
  type: object
  properties:
    id:
      type: string
    document_id:
      type: integer
    type:
      $ref: '#/NotificationType'
    title:
      type: string
    description:
      type: string
    days_remaining:
      type: integer
  required:
    - id
    - document_id
    - type
    - title
    - description
    - days_remaining

NotificationRuleCreateRequest:
  type: object
  properties:
    document_id:
      type: integer
      minimum: 1
      nullable: true
    days_before_due:
      type: integer
      minimum: 1
    is_active:
      type: boolean
      default: true
  required:
    - days_before_due

NotificationRuleUpdateRequest:
  type: object
  minProperties: 1
  properties:
    days_before_due:
      type: integer
      minimum: 1
      nullable: true
    is_active:
      type: boolean
      nullable: true

NotificationRuleResponse:
  type: object
  properties:
    id:
      type: integer
    organization_id:
      type: integer
    document_id:
      type: integer
      nullable: true
    days_before_due:
      type: integer
    is_active:
      type: boolean
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
  required:
    - id
    - organization_id
    - document_id
    - days_before_due
    - is_active
    - created_at
    - updated_at

SendEmailAlertsResponse:
  type: object
  properties:
    emails_sent:
      type: integer
  required:
    - emails_sent

CronSendEmailsResponse:
  type: object
  properties:
    emails_sent:
      type: integer
    orgs_processed:
      type: integer
    orgs_skipped:
      type: integer
  required:
    - emails_sent
    - orgs_processed
    - orgs_skipped