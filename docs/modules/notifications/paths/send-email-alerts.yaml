post:
  tags:
    - Notificaciones
  summary: Enviar alertas manuales por correo
  operationId: sendEmailAlerts
  responses:
    '200':
      description: Alertas enviadas.
      content:
        application/json:
          schema:
            $ref: '../schemas/schema.yaml#/SendEmailAlertsResponse'
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/AuthenticationError'
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ForbiddenError'
