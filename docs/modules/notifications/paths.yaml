get:
  tags:
    - Notificaciones
  summary: Consultar alertas contractuales del usuario autenticado
  operationId: listNotifications
  responses:
    '200':
      description: Lista de notificaciones obtenida.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: './schemas/schema.yaml#/NotificationResponse'
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '../../schemas/errors.yaml#/AuthenticationError'
