parameters:
  - name: template_id
    in: path
    required: true
    schema:
      type: integer
    description: ID de la plantilla.

post:
  tags:
    - Plantillas
  summary: Archivar una plantilla
  operationId: archiveTemplate
  responses:
    '200':
      description: Plantilla archivada correctamente.
      content:
        application/json:
          schema:
            $ref: '../schemas/schema.yaml#/TemplateResponse'
    '404':
      description: Template Not Found
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/NotFoundError'
