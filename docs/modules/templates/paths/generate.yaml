parameters:
  - name: template_id
    in: path
    required: true
    schema:
      type: integer
    description: ID de la plantilla.

post:
  summary: Generar un documento a partir de una plantilla
  operationId: generateTemplateDocument
  tags:
    - Plantillas
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          additionalProperties: true
          description: Payload de `form_data` utilizado para generar el documento a partir de la plantilla.
  responses:
    '201':
      description: Documento generado y persistido.
      content:
        application/json:
          schema:
            $ref: '../../documents/schemas/schema.yaml#/DocumentResponse'
    '400':
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ValidationError'
    '404':
      description: Template Not Found
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/NotFoundError'
