parameters:
  - name: template_id
    in: path
    required: true
    schema:
      type: integer
    description: ID de la plantilla.

post:
  summary: Generar contrato a partir de plantilla
  operationId: generateTemplateDocument
  tags:
    - Plantillas
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          additionalProperties: true
          description: Datos de formulario usados para renderizar la plantilla.
  responses:
    '201':
      description: Documento generado.
      content:
        application/json:
          schema:
            $ref: '../schemas/schema.yaml#/GeneratedDocumentResponse'
    '400':
      description: Datos inválidos para la plantilla.
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ErrorResponse'
    '404':
      description: Plantilla no encontrada.
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ErrorResponse'
