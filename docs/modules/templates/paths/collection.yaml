get:
  tags:
    - Plantillas
  summary: Listar plantillas de la organización
  operationId: listTemplates
  parameters:
    - name: document_type
      in: query
      required: false
      schema:
        $ref: '../../documents/schemas/schema.yaml#/DocumentType'
    - name: format_code
      in: query
      required: false
      schema:
        type: string
    - name: state
      in: query
      required: false
      schema:
        $ref: '../schemas/schema.yaml#/TemplateState'
  responses:
    '200':
      description: Lista de plantillas.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../schemas/schema.yaml#/TemplateResponse'

post:
  tags:
    - Plantillas
  summary: Crear plantilla
  operationId: createTemplate
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/schema.yaml#/CreateTemplateRequest'
  responses:
    '201':
      description: Plantilla creada.
      content:
        application/json:
          schema:
            $ref: '../schemas/schema.yaml#/TemplateResponse'
