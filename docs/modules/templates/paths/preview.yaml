post:
  tags:
    - Plantillas
  summary: Previsualizar plantilla
  operationId: previewTemplate
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/schema.yaml#/PreviewTemplateRequest'
  responses:
    '200':
      description: Previsualización generada.
      content:
        application/json:
          schema:
            $ref: '../schemas/schema.yaml#/PreviewTemplateResponse'
    '400':
      description: Payload inválido.
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ErrorResponse'
