DocumentType:
  type: string
  enum: [COMPANY, LABOR]

TemplateState:
  type: string
  enum: [DRAFT, PUBLISHED, ARCHIVED]

TemplateGenerationMode:
  type: string
  enum: [strict, adaptive]

TemplateField:
  type: object
  properties:
    key:
      type: string
    label:
      type: string
    type:
      type: string
    required:
      type: boolean
    placeholder:
      type: string
      nullable: true
  required:
    - key
    - label
    - type
    - required

TemplateContractDateMapping:
  type: object
  properties:
    start_date_field:
      type: string
    end_date_field:
      type: string
  required:
    - start_date_field
    - end_date_field

TemplateContent:
  type: object
  properties:
    body_md:
      type: string
    fields:
      type: array
      items:
        $ref: '#/TemplateField'
    operational_fields:
      type: array
      items:
        $ref: '#/TemplateField'
    version:
      type: string
      nullable: true
    contract_date_mapping:
      allOf:
        - $ref: '#/TemplateContractDateMapping'
      nullable: true
  required:
    - body_md
    - fields

TemplateResponse:
  type: object
  properties:
    id:
      type: integer
    organization_id:
      type: integer
    name:
      type: string
    description:
      type: string
      nullable: true
    document_type:
      $ref: '#/DocumentType'
    template_format_id:
      type: integer
      nullable: true
    format_code:
      type: string
      nullable: true
    format_label:
      type: string
      nullable: true
    content:
      $ref: '#/TemplateContent'
    created_at:
      type: string
      format: date-time
      nullable: true
    state:
      $ref: '#/TemplateState'
  required:
    - id
    - organization_id
    - name
    - document_type
    - content
    - state

TemplateFormatResponse:
  type: object
  properties:
    id:
      type: integer
    document_type:
      $ref: '#/DocumentType'
    format_code:
      type: string
    label:
      type: string
    default_name:
      type: string
    default_description:
      type: string
      nullable: true
  required:
    - id
    - document_type
    - format_code
    - label
    - default_name

GenerateTemplateDraftRequest:
  type: object
  properties:
    name:
      type: string
      nullable: true
    description:
      type: string
      nullable: true
    instructions:
      type: string
      nullable: true
    jurisdiction:
      type: string
      nullable: true
    document_type:
      allOf:
        - $ref: '#/DocumentType'
      nullable: true
    format_code:
      type: string
    generation_mode:
      $ref: '#/TemplateGenerationMode'
  required:
    - format_code

TemplateDraftMultipartRequest:
  type: object
  properties:
    request:
      type: string
      description: JSON serializado compatible con `GenerateTemplateDraftRequest`.
    file:
      type: string
      format: binary
  required:
    - request

PersistedTemplateDraftResponse:
  type: object
  properties:
    template:
      $ref: '#/TemplateResponse'
    warnings:
      type: array
      items:
        type: string
    source:
      type: object
      additionalProperties: true
    usage:
      type: object
      nullable: true
      additionalProperties: true
  required:
    - template

PreviewTemplateRequest:
  type: object
  properties:
    document_type:
      allOf:
        - $ref: '#/DocumentType'
      nullable: true
    format_code:
      type: string
    content:
      $ref: '#/TemplateContent'
    sample_data:
      type: object
      additionalProperties: true
  required:
    - format_code
    - content

PreviewTemplateResponse:
  type: object
  properties:
    markdown:
      type: string
    resolved_payload:
      type: object
      additionalProperties: true
    warnings:
      type: array
      items:
        type: string
  required:
    - markdown

CreateTemplateRequest:
  type: object
  properties:
    name:
      type: string
      nullable: true
    description:
      type: string
      nullable: true
    document_type:
      allOf:
        - $ref: '#/DocumentType'
      nullable: true
    format_code:
      type: string
    content:
      $ref: '#/TemplateContent'
  required:
    - format_code
    - content

UpdateTemplateRequest:
  type: object
  properties:
    name:
      type: string
      nullable: true
    description:
      type: string
      nullable: true
    content:
      $ref: '#/TemplateContent'
