TemplateState:
  type: string
  enum:
    - DRAFT
    - PUBLISHED
    - ARCHIVED

TemplateGenerationMode:
  type: string
  enum:
    - strict
    - adaptive

TemplateField:
  type: object
  properties:
    key:
      type: string
    label:
      type: string
    type:
      type: string
      default: text
    required:
      type: boolean
      default: false
    placeholder:
      type: string
      nullable: true
  required:
    - key
    - label

TemplateContractDateMapping:
  type: object
  properties:
    start_date_field:
      type: string
    end_date_field:
      type: string
  required:
    - start_date_field
    - end_date_field

TemplateContent:
  type: object
  properties:
    body_md:
      type: string
    fields:
      type: array
      items:
        $ref: '#/TemplateField'
    operational_fields:
      type: array
      items:
        $ref: '#/TemplateField'
      default: []
    version:
      type: string
      nullable: true
      default: '1.0'
    contract_date_mapping:
      allOf:
        - $ref: '#/TemplateContractDateMapping'
      nullable: true
  required:
    - body_md
    - fields

TemplateUsage:
  type: object
  properties:
    input_tokens:
      type: integer
      default: 0
    output_tokens:
      type: integer
      default: 0
    total_tokens:
      type: integer
      default: 0

TemplateResponse:
  type: object
  properties:
    id:
      type: integer
    organization_id:
      type: integer
    name:
      type: string
    description:
      type: string
      nullable: true
    document_type:
      $ref: '../../documents/schemas/schema.yaml#/DocumentType'
    template_format_id:
      type: integer
      nullable: true
    format_code:
      type: string
      nullable: true
    format_label:
      type: string
      nullable: true
    content:
      $ref: '#/TemplateContent'
    created_at:
      type: string
      format: date-time
      nullable: true
    state:
      $ref: '#/TemplateState'
  required:
    - id
    - organization_id
    - name
    - description
    - document_type
    - template_format_id
    - format_code
    - format_label
    - content
    - created_at
    - state

CreateTemplateRequest:
  type: object
  properties:
    name:
      type: string
      nullable: true
    description:
      type: string
      nullable: true
    document_type:
      allOf:
        - $ref: '../../documents/schemas/schema.yaml#/DocumentType'
      nullable: true
    format_code:
      type: string
    content:
      $ref: '#/TemplateContent'
  required:
    - format_code
    - content

UpdateTemplateRequest:
  type: object
  minProperties: 1
  properties:
    name:
      type: string
      nullable: true
    description:
      type: string
      nullable: true
    content:
      allOf:
        - $ref: '#/TemplateContent'
      nullable: true

TemplateFormatResponse:
  type: object
  properties:
    id:
      type: integer
    document_type:
      $ref: '../../documents/schemas/schema.yaml#/DocumentType'
    format_code:
      type: string
    label:
      type: string
    default_name:
      type: string
    default_description:
      type: string
      nullable: true
  required:
    - id
    - document_type
    - format_code
    - label
    - default_name
    - default_description

GenerateTemplateDraftRequest:
  type: object
  properties:
    name:
      type: string
      nullable: true
    description:
      type: string
      nullable: true
    instructions:
      type: string
      nullable: true
    jurisdiction:
      type: string
      nullable: true
    document_type:
      allOf:
        - $ref: '../../documents/schemas/schema.yaml#/DocumentType'
      nullable: true
    format_code:
      type: string
    generation_mode:
      $ref: '#/TemplateGenerationMode'
  required:
    - format_code

TemplateDraftMultipartRequest:
  type: object
  properties:
    file:
      type: string
      format: binary
      nullable: true
    request:
      type: string
      description: JSON serializado con la forma de GenerateTemplateDraftRequest.
      example: '{"name": "Mi Contrato", "format_code": "management"}'
  required:
    - request

PersistedTemplateDraftResponse:
  type: object
  properties:
    template:
      $ref: '#/TemplateResponse'
    warnings:
      type: array
      items:
        type: string
    source:
      type: object
      additionalProperties: true
    usage:
      allOf:
        - $ref: '#/TemplateUsage'
      nullable: true
  required:
    - template
    - warnings
    - source
    - usage
  example:
    template:
      id: 72
      organization_id: 2
      name: "Mi Primer Contrato"
      description: "Contrato de prueba"
      document_type: "COMPANY"
      template_format_id: 1
      format_code: "management"
      format_label: "Contrato de Management"
      content:
        body_md: "## CONTRATO DE MANAGEMENT\n\nConste por el presente documento..."
        fields:
          - key: "representante_cargo"
            label: "Cargo del representante"
            type: "text"
            required: true
            placeholder: "Ej. Gerente General"
        operational_fields: []
        version: "1.0"
        contract_date_mapping:
          start_date_field: "fecha_inicio_contrato"
          end_date_field: "fecha_fin_contrato"
      created_at: "2026-05-18T01:18:08.619Z"
      state: "DRAFT"
    warnings:
      - "Cláusulas de referencia no preservadas: CUARTA, QUINTA, SEXTA..."
    source:
      mode: "file_reference"
      filename: "contrato 003.pdf"
      generation_mode: "adaptive"
      reference_mode: "compact"
      detected_document_type: "COMPANY"
      clause_count: 10
    usage:
      input_tokens: 3268
      output_tokens: 9284
      total_tokens: 12552

PreviewTemplateRequest:
  type: object
  properties:
    document_type:
      allOf:
        - $ref: '../../documents/schemas/schema.yaml#/DocumentType'
      nullable: true
    format_code:
      type: string
    content:
      $ref: '#/TemplateContent'
    sample_data:
      type: object
      additionalProperties: true
      default: {}
  required:
    - format_code
    - content

PreviewTemplateResponse:
  type: object
  properties:
    markdown:
      type: string
    resolved_payload:
      type: object
      additionalProperties: true
    warnings:
      type: array
      items:
        type: string
  required:
    - markdown
    - resolved_payload
    - warnings

GeneratedDocumentResponse:
  $ref: '../../documents/schemas/schema.yaml#/DocumentResponse'
