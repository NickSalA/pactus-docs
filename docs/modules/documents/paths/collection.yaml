post:
  summary: Subir un nuevo documento
  description: Permite subir un nuevo documento al sistema para su posterior procesamiento.
  operationId: createDocument
  tags: 
    - Documentos
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          $ref: '../../documents/schemas/schema.yaml#/DocumentCreateRequest'
  responses:
    '201':
      description: Documento subido satisfactoriamente
      content:
        application/json:
          schema:
            $ref: '../../documents/schemas/schema.yaml#/DocumentResponse'
    '400':
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ValidationError'
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/AuthenticationError'
    '413':
      description: Payload Too Large
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/PayloadTooLargeError'

    '500':
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/InternalServerError'
    '502':
      description: Bad Gateway
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/BadGatewayError'
    '503':
      description: Service Unavailable
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ServiceUnavailableError'
    '504':
      description: Gateway Timeout
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/GatewayTimeoutError'

get:
  summary: Obtener todos los documentos existentes
  description: Devuelve una lista de todos los documentos que han sido subidos al sistema.
  operationId: getAllDocuments
  tags: 
    - Documentos
  responses:
    '200':
      description: OK
      content: 
        application/json:
          schema:
            $ref: '../../documents/schemas/schema.yaml#/DocumentListResponse'
          examples:
            twoDocuments:
              summary: Ejemplo con dos documentos
              value:
                - id: 1
                  filename: contrato1.pdf
                  size: 204800
                  uploaded_at: '2024-06-01T12:00:00Z'
                - id: 2
                  filename: contrato2.pdf
                  size: 102400
                  uploaded_at: '2024-06-02T15:30:00Z'
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/AuthenticationError'
    '500':
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/InternalServerError'
    '502':
      description: Bad Gateway
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/BadGatewayError'
    '503':
      description: Service Unavailable
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ServiceUnavailableError'
    '504':
      description: Gateway Timeout
      content:
        application/json:
          schema: 
            $ref: '../../../schemas/errors.yaml#/GatewayTimeoutError'