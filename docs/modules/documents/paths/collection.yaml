post:
  summary: Crear un nuevo documento
  description: Registra un documento usando un archivo binario y un campo `document` con JSON serializado.
  operationId: createDocument
  tags:
    - Documentos
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          $ref: '../schemas/schema.yaml#/DocumentMultipartCreateRequest'
  responses:
    '201':
      description: Documento creado satisfactoriamente.
      content:
        application/json:
          schema:
            $ref: '../schemas/schema.yaml#/DocumentResponse'
    '400':
      description: Payload inválido o archivo inválido.
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ValidationError'
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/AuthenticationError'
    '500':
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/InternalServerError'

get:
  summary: Listar documentos visibles para el usuario actual
  operationId: listDocuments
  tags:
    - Documentos
  responses:
    '200':
      description: Lista de documentos obtenida con éxito.
      content:
        application/json:
          schema:
            $ref: '../schemas/schema.yaml#/DocumentListResponse'
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/AuthenticationError'
