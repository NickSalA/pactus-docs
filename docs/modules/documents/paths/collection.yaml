post:
  summary: Subir un nuevo documento
  description: Recibe un archivo y un campo form-data `document` con JSON serializado para crear el documento.
  operationId: createDocument
  tags:
    - Documentos
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          $ref: '../schemas/schema.yaml#/DocumentMultipartCreateRequest'
  responses:
    '201':
      description: Documento creado satisfactoriamente.
      content:
        application/json:
          schema:
            $ref: '../schemas/schema.yaml#/DocumentResponse'
    '400':
      description: Datos del documento inválidos.
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ErrorResponse'
    '401':
      description: No autenticado.
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ErrorResponse'
    '422':
      description: Error de validación de FastAPI.
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ValidationError'

get:
  summary: Listar documentos
  description: Devuelve los documentos visibles para el usuario autenticado.
  operationId: listDocuments
  tags:
    - Documentos
  responses:
    '200':
      description: Documentos obtenidos satisfactoriamente.
      content:
        application/json:
          schema:
            $ref: '../schemas/schema.yaml#/DocumentListResponse'
    '401':
      description: No autenticado.
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/ErrorResponse'
