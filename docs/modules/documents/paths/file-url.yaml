parameters:
  - name: document_id
    in: path
    required: true
    schema:
      type: integer
    description: Identificador del documento.

get:
  summary: Obtener URL firmada del archivo de un documento
  operationId: getDocumentFileUrl
  tags:
    - Documentos
  responses:
    '200':
      description: URL firmada generada correctamente.
      content:
        application/json:
          schema:
            $ref: '../schemas/schema.yaml#/DocumentFileUrlResponse'
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/AuthenticationError'
    '404':
      description: Document Not Found
      content:
        application/json:
          schema:
            $ref: '../../../schemas/errors.yaml#/NotFoundError'
