DocumentCreateRequest:
  type: object
  properties:
    file:
      type: string
      format: binary
  required:
    - file

DocumentListResponse:
  type: array
  items:
    type: object
    properties:
      id:
        type: integer
        description: El identificador único del documento.
        example: 1
      filename:
        type: string
        description: El nombre del archivo subido.
        example: contrato.pdf
      upload_date:
        type: string
        format: date-time
        description: La fecha y hora en que se subió el documento.
        example: 2024-06-01T12:00:00Z