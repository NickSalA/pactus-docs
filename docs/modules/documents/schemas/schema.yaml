DocumentType:
  type: string
  enum:
    - COMPANY
    - LABOR
  description: Tipo de documento permitido por el backend.

DocumentState:
  type: string
  enum:
    - DRAFT
    - PENDING_SIGNATURE
    - ACTIVE
    - EXPIRING_SOON
    - EXPIRED
    - TERMINATED
  description: Estado actual del documento.

CurrencyType:
  type: string
  enum:
    - PEN
    - USD
    - EUR

DocumentServiceItemRequest:
  type: object
  properties:
    service_id:
      type: integer
      minimum: 1
    description:
      type: string
      nullable: true
    value:
      type: number
      format: float
      minimum: 0
    currency:
      $ref: '#/CurrencyType'
    start_date:
      type: string
      format: date
    end_date:
      type: string
      format: date
  required:
    - service_id
    - value
    - currency
    - start_date
    - end_date

DocumentServiceItemResponse:
  allOf:
    - $ref: '#/DocumentServiceItemRequest'
    - type: object
      properties:
        id:
          type: integer
      required:
        - id

CreateDocumentDraftRequest:
  type: object
  properties:
    name:
      type: string
      nullable: true
    client:
      type: string
      nullable: true
    type:
      allOf:
        - $ref: '#/DocumentType'
      nullable: true
    start_date:
      type: string
      format: date
      nullable: true
    end_date:
      type: string
      format: date
      nullable: true
    form_data:
      type: object
      additionalProperties: true
      default: {}
    state:
      allOf:
        - $ref: '#/DocumentState'
      nullable: true
    folder_id:
      type: integer
      minimum: 1
      nullable: true
    service_items:
      type: array
      items:
        $ref: '#/DocumentServiceItemRequest'
      default: []

DocumentMultipartCreateRequest:
  type: object
  properties:
    file:
      type: string
      format: binary
    document:
      type: string
      description: JSON serializado con la forma de CreateDocumentDraftRequest.
      example: '{"name":"Contrato Alpha","client":"Acme","type":"COMPANY","form_data":{}}'
  required:
    - file

DocumentMultipartUpdateRequest:
  type: object
  properties:
    file:
      type: string
      format: binary
      nullable: true
    document:
      type: string
      description: JSON serializado con campos parciales de UpdateDocumentRequest.
  required:
    - document

UpdateDocumentRequest:
  type: object
  properties:
    name:
      type: string
      nullable: true
    client:
      type: string
      nullable: true
    type:
      allOf:
        - $ref: '#/DocumentType'
      nullable: true
    start_date:
      type: string
      format: date
      nullable: true
    end_date:
      type: string
      format: date
      nullable: true
    form_data:
      type: object
      additionalProperties: true
      nullable: true
    state:
      allOf:
        - $ref: '#/DocumentState'
      nullable: true
    folder_id:
      type: integer
      minimum: 1
      nullable: true
    service_items:
      type: array
      nullable: true
      items:
        $ref: '#/DocumentServiceItemRequest'

DocumentResponse:
  type: object
  properties:
    id:
      type: integer
    name:
      type: string
      nullable: true
    client:
      type: string
      nullable: true
    type:
      allOf:
        - $ref: '#/DocumentType'
      nullable: true
    start_date:
      type: string
      format: date
      nullable: true
    end_date:
      type: string
      format: date
      nullable: true
    form_data:
      type: object
      additionalProperties: true
    state:
      allOf:
        - $ref: '#/DocumentState'
      nullable: true
    folder_id:
      type: integer
      nullable: true
    file_path:
      type: string
      nullable: true
    file_name:
      type: string
      nullable: true
    service_items:
      type: array
      items:
        $ref: '#/DocumentServiceItemResponse'
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
  required:
    - id
    - name
    - client
    - type
    - start_date
    - end_date
    - form_data
    - state
    - folder_id
    - file_path
    - file_name
    - service_items
    - created_at
    - updated_at

DocumentListResponse:
  type: array
  items:
    $ref: '#/DocumentResponse'

DocumentFileUrlResponse:
  type: object
  properties:
    url:
      type: string
      format: uri
  required:
    - url

DocumentCatalogServiceResponse:
  type: object
  properties:
    id:
      type: integer
    name:
      type: string
  required:
    - id
    - name
