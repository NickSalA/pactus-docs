DocumentType:
  type: string
  enum:
    - COMPANY
    - LABOR
  description: Tipo funcional de contrato usado para permisos y ruteo.

DocumentState:
  type: string
  enum:
    - DRAFT
    - PENDING_SIGNATURE
    - ACTIVE
    - EXPIRING_SOON
    - EXPIRED
    - TERMINATED
  description: Estado actual del documento.

CurrencyType:
  type: string
  enum:
    - PEN
    - USD
    - EUR

DocumentServiceItemRequest:
  type: object
  description: Servicio asociado a un contrato de empresa.
  properties:
    service_id:
      type: integer
      minimum: 1
    description:
      type: string
      nullable: true
    value:
      type: number
      format: float
      minimum: 0
    currency:
      $ref: '#/CurrencyType'
    start_date:
      type: string
      format: date
    end_date:
      type: string
      format: date
  required:
    - service_id
    - value
    - currency
    - start_date
    - end_date

DocumentServiceItemResponse:
  allOf:
    - $ref: '#/DocumentServiceItemRequest'
    - type: object
      properties:
        id:
          type: integer
      required:
        - id

CompanyContractRequest:
  type: object
  description: Datos específicos de contratos de empresa.
  properties:
    ruc:
      type: string
      nullable: true
      description: RUC de la contraparte empresa.
    client:
      type: string
      nullable: true
      description: Nombre de la contraparte empresa.

CompanyContractResponse:
  allOf:
    - $ref: '#/CompanyContractRequest'
    - type: object
      properties:
        id:
          type: integer
        document_id:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - document_id
        - created_at
        - updated_at

LaborContractRequest:
  type: object
  description: Datos específicos de contratos laborales.
  properties:
    worker_name:
      type: string
      nullable: true
    worker_document_number:
      type: string
      nullable: true
    position:
      type: string
      nullable: true
    salary_value:
      type: number
      format: float
      minimum: 0
      nullable: true
    salary_currency:
      allOf:
        - $ref: '#/CurrencyType'
      nullable: true
    salary_periodicity:
      type: string
      nullable: true
    contract_modality:
      type: string
      nullable: true

LaborContractResponse:
  allOf:
    - $ref: '#/LaborContractRequest'
    - type: object
      properties:
        id:
          type: integer
        document_id:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - document_id
        - created_at
        - updated_at

CreateDocumentDraftRequest:
  type: object
  properties:
    type:
      type: string
      nullable: true
      description: Tipo técnico/origen del documento, por ejemplo manual_upload o template.
    contract_type:
      allOf:
        - $ref: '#/DocumentType'
      nullable: true
      description: Tipo funcional de contrato usado para permisos y clasificación.
    name:
      type: string
      nullable: true
      deprecated: true
      description: Campo legacy aceptado durante la transición.
    client:
      type: string
      nullable: true
      deprecated: true
      description: Campo legacy aceptado durante la transición.
    start_date:
      type: string
      format: date
      nullable: true
    end_date:
      type: string
      format: date
      nullable: true
    form_data:
      type: object
      additionalProperties: true
      default: {}
    company_contract:
      allOf:
        - $ref: '#/CompanyContractRequest'
      nullable: true
    labor_contract:
      allOf:
        - $ref: '#/LaborContractRequest'
      nullable: true
    state:
      allOf:
        - $ref: '#/DocumentState'
      nullable: true
    folder_id:
      type: integer
      minimum: 1
      nullable: true
    service_items:
      type: array
      description: Servicios asociados al contrato de empresa. No aplica para contratos laborales.
      items:
        $ref: '#/DocumentServiceItemRequest'
      default: []

DocumentMultipartCreateRequest:
  type: object
  properties:
    file:
      type: string
      format: binary
    document:
      type: string
      description: JSON serializado con la forma de CreateDocumentDraftRequest.
      example: '{"contract_type":"COMPANY","company_contract":{"client":"Acme S.A.C.","ruc":"20600000001"},"form_data":{"value":1200,"currency":"PEN"}}'
  required:
    - file

DocumentMultipartUpdateRequest:
  type: object
  properties:
    file:
      type: string
      format: binary
      nullable: true
    document:
      type: string
      description: JSON serializado con campos parciales de UpdateDocumentRequest.
      example: '{"contract_type":"LABOR","labor_contract":{"worker_name":"Ana Perez","position":"Analista"}}'
  required:
    - document

UpdateDocumentRequest:
  type: object
  properties:
    type:
      type: string
      nullable: true
      description: Tipo técnico/origen del documento.
    contract_type:
      allOf:
        - $ref: '#/DocumentType'
      nullable: true
    name:
      type: string
      nullable: true
      deprecated: true
    client:
      type: string
      nullable: true
      deprecated: true
    start_date:
      type: string
      format: date
      nullable: true
    end_date:
      type: string
      format: date
      nullable: true
    form_data:
      type: object
      additionalProperties: true
      nullable: true
    state:
      allOf:
        - $ref: '#/DocumentState'
      nullable: true
    folder_id:
      type: integer
      minimum: 1
      nullable: true
    service_items:
      type: array
      nullable: true
      items:
        $ref: '#/DocumentServiceItemRequest'
    company_contract:
      allOf:
        - $ref: '#/CompanyContractRequest'
      nullable: true
    labor_contract:
      allOf:
        - $ref: '#/LaborContractRequest'
      nullable: true

DocumentResponse:
  type: object
  properties:
    id:
      type: integer
    type:
      type: string
      nullable: true
      description: Tipo técnico/origen del documento.
    start_date:
      type: string
      format: date
      nullable: true
    end_date:
      type: string
      format: date
      nullable: true
    form_data:
      type: object
      additionalProperties: true
    state:
      allOf:
        - $ref: '#/DocumentState'
      nullable: true
    folder_id:
      type: integer
      nullable: true
    file_path:
      type: string
      nullable: true
    file_name:
      type: string
      nullable: true
    service_items:
      type: array
      items:
        $ref: '#/DocumentServiceItemResponse'
    company_contract:
      allOf:
        - $ref: '#/CompanyContractResponse'
      nullable: true
    labor_contract:
      allOf:
        - $ref: '#/LaborContractResponse'
      nullable: true
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
  required:
    - id
    - created_at
    - updated_at

DocumentListResponse:
  type: array
  items:
    $ref: '#/DocumentResponse'

DocumentFileUrlResponse:
  type: object
  properties:
    url:
      type: string
      format: uri
  required:
    - url

DocumentCatalogServiceResponse:
  type: object
  properties:
    id:
      type: integer
    name:
      type: string
  required:
    - id
    - name
