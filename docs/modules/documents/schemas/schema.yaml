DocumentType:
  type: string
  enum: [COMPANY, LABOR]

DocumentState:
  type: string
  enum: [DRAFT, PENDING_SIGNATURE, ACTIVE, EXPIRING_SOON, EXPIRED, TERMINATED]

CurrencyType:
  type: string
  enum: [PEN, USD, EUR]

DocumentServiceItemRequest:
  type: object
  properties:
    service_id:
      type: integer
      minimum: 1
    description:
      type: string
      nullable: true
    value:
      type: number
      format: float
      minimum: 0
    currency:
      $ref: '#/CurrencyType'
    start_date:
      type: string
      format: date
    end_date:
      type: string
      format: date
  required:
    - service_id
    - value
    - currency
    - start_date
    - end_date

DocumentServiceItemResponse:
  type: object
  properties:
    id:
      type: integer
    service_id:
      type: integer
    description:
      type: string
      nullable: true
    value:
      type: number
      format: float
    currency:
      $ref: '#/CurrencyType'
    start_date:
      type: string
      format: date
    end_date:
      type: string
      format: date
  required:
    - id
    - service_id
    - value
    - currency
    - start_date
    - end_date

CreateDocumentDraftRequest:
  type: object
  properties:
    name:
      type: string
      nullable: true
    client:
      type: string
      nullable: true
    type:
      allOf:
        - $ref: '#/DocumentType'
      nullable: true
    start_date:
      type: string
      format: date
      nullable: true
    end_date:
      type: string
      format: date
      nullable: true
    form_data:
      type: object
      additionalProperties: true
    state:
      allOf:
        - $ref: '#/DocumentState'
      nullable: true
    folder_id:
      type: integer
      nullable: true
    service_items:
      type: array
      items:
        $ref: '#/DocumentServiceItemRequest'

UpdateDocumentRequest:
  type: object
  properties:
    name:
      type: string
      nullable: true
    client:
      type: string
      nullable: true
    type:
      allOf:
        - $ref: '#/DocumentType'
      nullable: true
    start_date:
      type: string
      format: date
      nullable: true
    end_date:
      type: string
      format: date
      nullable: true
    form_data:
      type: object
      additionalProperties: true
      nullable: true
    state:
      allOf:
        - $ref: '#/DocumentState'
      nullable: true
    folder_id:
      type: integer
      nullable: true
    service_items:
      type: array
      nullable: true
      items:
        $ref: '#/DocumentServiceItemRequest'

DocumentMultipartCreateRequest:
  type: object
  properties:
    file:
      type: string
      format: binary
    document:
      type: string
      description: JSON serializado compatible con `CreateDocumentDraftRequest`.
  required:
    - file
    - document

DocumentMultipartUpdateRequest:
  type: object
  properties:
    file:
      type: string
      format: binary
    document:
      type: string
      description: JSON serializado compatible con `UpdateDocumentRequest`.
  required:
    - document

DocumentResponse:
  type: object
  properties:
    id:
      type: integer
    name:
      type: string
      nullable: true
    client:
      type: string
      nullable: true
    type:
      allOf:
        - $ref: '#/DocumentType'
      nullable: true
    start_date:
      type: string
      format: date
      nullable: true
    end_date:
      type: string
      format: date
      nullable: true
    form_data:
      type: object
      additionalProperties: true
    state:
      allOf:
        - $ref: '#/DocumentState'
      nullable: true
    folder_id:
      type: integer
      nullable: true
    file_path:
      type: string
      nullable: true
    file_name:
      type: string
      nullable: true
    service_items:
      type: array
      items:
        $ref: '#/DocumentServiceItemResponse'
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
  required:
    - id
    - form_data
    - service_items
    - created_at
    - updated_at

DocumentListResponse:
  type: array
  items:
    $ref: '#/DocumentResponse'

DocumentFileUrlResponse:
  type: object
  properties:
    url:
      type: string
  required:
    - url
