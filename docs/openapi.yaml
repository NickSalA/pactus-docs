openapi: '3.0.3'
info:
  title: ContractIA
  description: API para la gestión de contratos, usuarios, plantillas, integraciones y chatbot.
  version: '1.0.0'
  license:
    name: Proprietary - All Rights Reserved
    url: https://github.com/NickSalA/ContractIA/blob/main/LICENSE
  contact:
    name: NickSalA
    url: https://github.com/NickSalA/ContractIA
    email: contact@example.com
servers:
  - url: http://localhost:8000
    description: Desarrollo local

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - BearerAuth: []

tags:
  - name: Usuarios
    description: Operaciones para el usuario autenticado.
  - name: Chatbot
    description: Operaciones para interactuar con el chatbot.
  - name: Conversaciones
    description: Operaciones para la gestión de conversaciones.
  - name: Documentos
    description: Operaciones para la gestión de documentos.
  - name: Servicios
    description: Catálogo de servicios asociados a documentos.
  - name: Carpetas
    description: Carpetas para organizar documentos.
  - name: Integraciones
    description: Operaciones para la integración con servicios de terceros.
  - name: Organizaciones
    description: Operaciones de membresía de la organización actual.
  - name: Notificaciones
    description: Operaciones para alertas, correos y reglas de notificación.
  - name: Plantillas
    description: Operaciones para la gestión y generación de documentos mediante plantillas.
  - name: Dashboards
    description: Endpoints para gráficos y métricas del dashboard.
  - name: Sistema
    description: Operaciones básicas de estado del servidor.

paths:
  /:
    get:
      tags:
        - Sistema
      summary: Verificar estado del servidor
      operationId: home
      security: []
      responses:
        '200':
          description: Servidor disponible.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  version:
                    type: string
                required:
                  - message
                  - version
  /user/me:
    $ref: 'modules/users/paths/me.yaml'
  /chatbot/:
    $ref: 'modules/chat/paths.yaml'
  /conversations/user/{user_id}:
    $ref: 'modules/conversations/paths/user.yaml'
  /conversations/{conversation_id}:
    $ref: 'modules/conversations/paths/item.yaml'
  /documents/:
    $ref: 'modules/documents/paths/collection.yaml'
  /documents/{document_id}:
    $ref: 'modules/documents/paths/item.yaml'
  /documents/{document_id}/file-url:
    $ref: 'modules/documents/paths/file-url.yaml'
  /services/:
    $ref: 'modules/services/paths/collection.yaml'
  /services/{service_id}:
    $ref: 'modules/services/paths/item.yaml'
  /folders/:
    $ref: 'modules/folders/paths/collection.yaml'
  /folders/{folder_id}:
    $ref: 'modules/folders/paths/item.yaml'
  /integrations/drive/auth-url:
    $ref: 'modules/integrations/paths/auth-url.yaml'
  /integrations/drive/callback:
    $ref: 'modules/integrations/paths/callback.yaml'
  /integrations/drive/download/{file_id}:
    $ref: 'modules/integrations/paths/download.yaml'
  /integrations/drive/import:
    $ref: 'modules/integrations/paths/import.yaml'
  /organizations/:
    $ref: 'modules/organizations/paths/collection.yaml'
  /organizations/{organization_id}:
    $ref: 'modules/organizations/paths/item.yaml'
  /organizations/me/members:
    $ref: 'modules/organizations/paths/members.yaml'
  /organizations/me/members/{member_id}/role:
    $ref: 'modules/organizations/paths/member-role.yaml'
  /organizations/me/members/{member_id}/notifications:
    $ref: 'modules/organizations/paths/member-notifications.yaml'
  /notifications/:
    $ref: 'modules/notifications/paths/collection.yaml'
  /notifications/send-email-alerts:
    $ref: 'modules/notifications/paths/send-email-alerts.yaml'
  /notifications/cron/send-emails:
    $ref: 'modules/notifications/paths/cron-send-emails.yaml'
  /notifications/rules:
    $ref: 'modules/notifications/paths/rules.yaml'
  /notifications/rules/{rule_id}:
    $ref: 'modules/notifications/paths/rule-item.yaml'
  /templates/:
    $ref: 'modules/templates/paths/collection.yaml'
  /templates/formats:
    $ref: 'modules/templates/paths/formats.yaml'
  /templates/drafts:
    $ref: 'modules/templates/paths/drafts.yaml'
  /templates/preview:
    $ref: 'modules/templates/paths/preview.yaml'
  /templates/{template_id}:
    $ref: 'modules/templates/paths/item.yaml'
  /templates/{template_id}/generate:
    $ref: 'modules/templates/paths/generate.yaml'
  /templates/{template_id}/publish:
    $ref: 'modules/templates/paths/publish.yaml'
  /templates/{template_id}/archive:
    $ref: 'modules/templates/paths/archive.yaml'
  /dashboard/area_chart/company:
    $ref: 'modules/dashboard/paths/area-chart-company.yaml'
  /dashboard/area_chart/labor:
    $ref: 'modules/dashboard/paths/area-chart-labor.yaml'
  /dashboard/alert_center/company:
    $ref: 'modules/dashboard/paths/alert-center-company.yaml'
  /dashboard/alert_center/labor:
    $ref: 'modules/dashboard/paths/alert-center-labor.yaml'
  /dashboard/recent_contracts/company:
    $ref: 'modules/dashboard/paths/recent-contracts-company.yaml'
  /dashboard/recent_contracts/labor:
    $ref: 'modules/dashboard/paths/recent-contracts-labor.yaml'
  /dashboard/top_companies:
    $ref: 'modules/dashboard/paths/top-companies.yaml'
  /dashboard/top_services:
    $ref: 'modules/dashboard/paths/top-services.yaml'
