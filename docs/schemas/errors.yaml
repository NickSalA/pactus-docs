ErrorResponse:
  type: object
  description: Respuesta común de los manejadores de errores del backend.
  properties:
    error:
      type: boolean
      example: true
    type:
      type: string
      description: Nombre de la excepción o categoría del error.
      example: NotFoundError
    message:
      type: string
      description: Mensaje legible para el consumidor.
      example: Recurso no encontrado
    request_id:
      type: string
      description: Identificador de la petición para trazabilidad.
      example: req-7f9c2a1b
  required:
    - error
    - type
    - message
    - request_id

ValidationError:
  allOf:
    - $ref: '#/ErrorResponse'
    - type: object
      description: Error de validación producido por FastAPI/Pydantic.
      properties:
        type:
          type: string
          example: ValidationError
        message:
          type: string
          example: Los datos enviados en la petición no son válidos.
        details:
          type: array
          items:
            type: string
          example:
            - body -> name: Field required

AuthenticationError:
  $ref: '#/ErrorResponse'

NotFoundError:
  $ref: '#/ErrorResponse'

PayloadTooLargeError:
  $ref: '#/ErrorResponse'

TooManyRequestsError:
  $ref: '#/ErrorResponse'

InternalServerError:
  $ref: '#/ErrorResponse'

BadGatewayError:
  $ref: '#/ErrorResponse'

ServiceUnavailableError:
  $ref: '#/ErrorResponse'

GatewayTimeoutError:
  $ref: '#/ErrorResponse'
