ErrorResponse:
  type: object
  required:
    - code
    - message
  properties:
    code:
      type: string
      description: Application-specific error code.
      example: INTERNAL_ERROR
    message:
      type: string
      description: Human-readable error message.
      example: Ha ocurrido un error.
    details:
      type: object
      description: Optional structured details for debugging or validation.
      additionalProperties: true
    traceId:
      type: string
      description: Request identifier for tracing logs.
      example: req-7f9c2a1b

ValidationError:
  type: object
  required:
    - code
    - message
  properties:
    code:
      type: string
      example: VALIDATION_ERROR
    message:
      type: string
      example: Uno o mas campos no son validos.
    details:
      type: object
      additionalProperties: true
    traceId:
      type: string
      example: req-7f9c2a1b
    type:
      type: string
      enum:
        - validation_error
    fieldErrors:
      type: array
      description: List of field-specific validation errors.
      items:
        type: object
        required:
          - field
          - message
        properties:
          field:
            type: string
            example: email
          message:
            type: string
            example: El campo email es obligatorio.

AuthenticationError:
  type: object
  required:
    - code
    - message
  properties:
    code:
      type: string
      example: INVALID_CREDENTIALS
    message:
      type: string
      example: Email o contrasena invalidos.
    details:
      type: object
      additionalProperties: true
    traceId:
      type: string
      example: req-7f9c2a1b
    type:
      type: string
      enum:
