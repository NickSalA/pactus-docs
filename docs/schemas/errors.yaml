    - message
  properties:
    code:
      type: string
      example: NOT_FOUND
    message:
      type: string
      example: El recurso solicitado no fue encontrado.
    details:
      type: object
      additionalProperties: true
    traceId:
      type: string
      example: req-7f9c2a1b
    type:
      type: string
      enum:
        - not_found
    resourceId:
      type: string
      example: resource-12345

