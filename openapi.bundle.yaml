openapi: 3.0.3
info:
  title: Pactus
  description: API para la gestión de contratos, usuarios, plantillas, integraciones y chatbot.
  version: 1.0.0
  license:
    name: Proprietary - All Rights Reserved
    url: https://github.com/NickSalA/Pactus/blob/main/LICENSE
  contact:
    name: NickSalA
    url: https://github.com/NickSalA/Pactus
    email: contact@example.com
servers:
  - url: http://localhost:8000
    description: Desarrollo local
security:
  - BearerAuth: []
tags:
  - name: Usuarios
    description: Operaciones para el usuario autenticado.
  - name: Chatbot
    description: Operaciones para interactuar con el chatbot.
  - name: Conversaciones
    description: Operaciones para la gestión de conversaciones.
  - name: Documentos
    description: Operaciones para la gestión de documentos.
  - name: Servicios
    description: Catálogo de servicios asociados a documentos.
  - name: Carpetas
    description: Carpetas para organizar documentos.
  - name: Integraciones
    description: Operaciones para la integración con servicios de terceros.
  - name: Organizaciones
    description: Operaciones de membresía de la organización actual.
  - name: Notificaciones
    description: Operaciones para alertas, correos y reglas de notificación.
  - name: Plantillas
    description: Operaciones para la gestión y generación de documentos mediante plantillas.
  - name: Dashboards
    description: Endpoints para gráficos y métricas del dashboard.
  - name: Sistema
    description: Operaciones básicas de estado del servidor.
paths:
  /:
    get:
      tags:
        - Sistema
      summary: Verificar estado del servidor
      operationId: home
      security: []
      responses:
        '200':
          description: Servidor disponible.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  version:
                    type: string
                required:
                  - message
                  - version
  /user/me:
    get:
      summary: Obtener perfil del usuario actual
      description: Retorna la información del usuario autenticado a partir del token Bearer JWT.
      operationId: getMe
      tags:
        - Usuarios
      responses:
        '200':
          description: Perfil del usuario obtenido con éxito.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: No autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /chatbot/:
    post:
      summary: Enviar mensaje al chatbot
      description: Envía un mensaje al agente RAG y devuelve la respuesta junto al identificador de conversación.
      operationId: sendChatMessage
      tags:
        - Chatbot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: Respuesta exitosa.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '401':
          description: No autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Datos de entrada inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /conversations/user/{user_id}:
    parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: integer
        description: ID del usuario propietario de las conversaciones.
    get:
      summary: Listar conversaciones de un usuario
      description: Lista las conversaciones del usuario indicado. El backend rechaza la consulta si el ID no coincide con el usuario autenticado.
      operationId: listUserConversations
      tags:
        - Conversaciones
      responses:
        '200':
          description: Conversaciones obtenidas satisfactoriamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConversationList'
        '401':
          description: No autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: No tiene permisos para acceder a conversaciones de otro usuario.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /conversations/{conversation_id}:
    parameters:
      - name: conversation_id
        in: path
        required: true
        schema:
          type: integer
        description: ID de la conversación.
    get:
      summary: Obtener una conversación por ID
      description: Devuelve el historial de mensajes de una conversación específica del usuario autenticado.
      operationId: getConversation
      tags:
        - Conversaciones
      responses:
        '200':
          description: Conversación obtenida satisfactoriamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationRead'
        '401':
          description: No autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Conversación no encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /documents/:
    post:
      summary: Subir un nuevo documento
      description: Recibe un archivo y un campo form-data `document` con JSON serializado para crear el documento. Usa `contract_type` para clasificarlo como COMPANY o LABOR; `type` queda reservado para el origen técnico del documento.
      operationId: createDocument
      tags:
        - Documentos
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DocumentMultipartCreateRequest'
      responses:
        '201':
          description: Documento creado satisfactoriamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '400':
          description: Datos del documento inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: No autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Error de validación de FastAPI.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    get:
      summary: Listar documentos
      description: Devuelve los documentos visibles para el usuario autenticado.
      operationId: listDocuments
      tags:
        - Documentos
      parameters:
        - name: limit
          in: query
          required: false
          description: Máximo de documentos a retornar.
          schema:
            type: integer
            minimum: 1
            nullable: true
        - name: offset
          in: query
          required: false
          description: Número de documentos a omitir.
          schema:
            type: integer
            minimum: 0
            nullable: true
      responses:
        '200':
          description: Documentos obtenidos satisfactoriamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentListResponse'
        '401':
          description: No autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /documents/{document_id}:
    parameters:
      - name: document_id
        in: path
        required: true
        schema:
          type: integer
        description: ID del documento.
    get:
      summary: Obtener un documento por ID
      operationId: getDocument
      tags:
        - Documentos
      responses:
        '200':
          description: Documento obtenido satisfactoriamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '404':
          description: Documento no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Actualizar un documento
      description: Recibe un campo form-data `document` con JSON serializado y opcionalmente un nuevo archivo. Los datos específicos deben enviarse en `company_contract` o `labor_contract` según el `contract_type`.
      operationId: updateDocument
      tags:
        - Documentos
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DocumentMultipartUpdateRequest'
      responses:
        '200':
          description: Documento actualizado satisfactoriamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '400':
          description: Datos inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Documento no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Eliminar un documento
      operationId: deleteDocument
      tags:
        - Documentos
      responses:
        '204':
          description: Documento eliminado satisfactoriamente.
        '404':
          description: Documento no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /documents/{document_id}/file-url:
    parameters:
      - name: document_id
        in: path
        required: true
        schema:
          type: integer
        description: ID del documento.
    get:
      summary: Obtener URL firmada del archivo
      description: Genera una URL temporal para acceder al archivo almacenado del documento.
      operationId: getDocumentFileUrl
      tags:
        - Documentos
      responses:
        '200':
          description: URL firmada generada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentFileUrlResponse'
        '404':
          description: Documento no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /services/:
    get:
      summary: Listar servicios del catálogo
      operationId: listServices
      tags:
        - Servicios
      parameters:
        - name: include_inactive
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Solo los administradores pueden incluir servicios inactivos.
      responses:
        '200':
          description: Servicios obtenidos satisfactoriamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceListResponse'
        '401':
          description: No autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Crear un servicio del catálogo
      operationId: createService
      tags:
        - Servicios
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceCreateRequest'
      responses:
        '201':
          description: Servicio creado satisfactoriamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceResponse'
        '401':
          description: No autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Datos inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /services/{service_id}:
    parameters:
      - name: service_id
        in: path
        required: true
        schema:
          type: integer
        description: ID del servicio.
    patch:
      summary: Actualizar un servicio del catálogo
      operationId: updateService
      tags:
        - Servicios
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceUpdateRequest'
      responses:
        '200':
          description: Servicio actualizado satisfactoriamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceResponse'
        '404':
          description: Servicio no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Eliminar un servicio del catálogo
      operationId: deleteService
      tags:
        - Servicios
      responses:
        '204':
          description: Servicio eliminado satisfactoriamente.
        '404':
          description: Servicio no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /folders/:
    get:
      summary: Listar carpetas
      operationId: listFolders
      tags:
        - Carpetas
      responses:
        '200':
          description: Carpetas obtenidas satisfactoriamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderListResponse'
        '401':
          description: No autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Crear una carpeta
      operationId: createFolder
      tags:
        - Carpetas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FolderCreateRequest'
      responses:
        '201':
          description: Carpeta creada satisfactoriamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderResponse'
        '422':
          description: Datos inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /folders/{folder_id}:
    parameters:
      - name: folder_id
        in: path
        required: true
        schema:
          type: integer
        description: ID de la carpeta.
    patch:
      summary: Actualizar una carpeta
      operationId: updateFolder
      tags:
        - Carpetas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FolderUpdateRequest'
      responses:
        '200':
          description: Carpeta actualizada satisfactoriamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderResponse'
        '404':
          description: Carpeta no encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Eliminar una carpeta
      operationId: deleteFolder
      tags:
        - Carpetas
      responses:
        '204':
          description: Carpeta eliminada satisfactoriamente.
        '404':
          description: Carpeta no encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /integrations/drive/auth-url:
    get:
      tags:
        - Integraciones
      summary: Obtener URL de autorización de Google Drive
      operationId: getDriveAuthUrl
      responses:
        '200':
          description: URL generada con éxito.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthURLResponse'
  /integrations/drive/callback:
    get:
      tags:
        - Integraciones
      summary: Intercambiar código de Google por tokens
      operationId: exchangeDriveCode
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tokens obtenidos con éxito.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Parámetros inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /integrations/drive/download/{file_id}:
    parameters:
      - name: file_id
        in: path
        required: true
        schema:
          type: string
        description: ID del archivo en Google Drive.
    post:
      tags:
        - Integraciones
      summary: Descargar archivo de Google Drive
      operationId: downloadDriveFile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriveRequest'
      responses:
        '200':
          description: Archivo descargado.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          description: No autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /integrations/drive/import:
    post:
      tags:
        - Integraciones
      summary: Importar archivos de Google Drive en segundo plano
      operationId: importDriveFiles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportRequest'
      responses:
        '200':
          description: Importación iniciada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportResponse'
        '401':
          description: No autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: No tiene permisos para importar este tipo de contrato.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Datos inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /organizations/me/members:
    get:
      summary: Listar miembros de la organización actual
      operationId: listOrganizationMembers
      tags:
        - Organizaciones
      responses:
        '200':
          description: Miembros obtenidos satisfactoriamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationMemberListResponse'
        '401':
          description: No autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Agregar miembro a la organización actual
      operationId: addOrganizationMember
      tags:
        - Organizaciones
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationMemberCreateRequest'
      responses:
        '201':
          description: Miembro creado satisfactoriamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: No autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: No autorizado para administrar miembros.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /organizations/me/members/{member_id}/role:
    parameters:
      - name: member_id
        in: path
        required: true
        schema:
          type: integer
        description: ID del miembro.
    patch:
      summary: Actualizar rol de un miembro
      operationId: updateOrganizationMemberRole
      tags:
        - Organizaciones
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationMemberRoleUpdateRequest'
      responses:
        '200':
          description: Rol actualizado satisfactoriamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: Miembro no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /organizations/me/members/{member_id}/notifications:
    parameters:
      - name: member_id
        in: path
        required: true
        schema:
          type: integer
        description: ID del miembro.
    patch:
      summary: Actualizar preferencia de notificaciones de un miembro
      operationId: updateOrganizationMemberNotifications
      tags:
        - Organizaciones
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationMemberNotificationsUpdateRequest'
      responses:
        '200':
          description: Preferencia actualizada satisfactoriamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: Miembro no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /notifications/:
    get:
      tags:
        - Notificaciones
      summary: Consultar notificaciones de contratos próximos a vencer
      operationId: listNotifications
      responses:
        '200':
          description: Lista de notificaciones obtenida.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotificationResponse'
        '401':
          description: No autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /notifications/send-email-alerts:
    post:
      tags:
        - Notificaciones
      summary: Enviar alertas de vencimiento por correo
      description: Envía correos consolidados para la organización del usuario autenticado. Requiere rol administrador.
      operationId: sendEmailAlerts
      responses:
        '200':
          description: Alertas enviadas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendEmailAlertsResponse'
        '401':
          description: No autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Solo administradores pueden enviar alertas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /notifications/cron/send-emails:
    post:
      tags:
        - Notificaciones
      summary: Enviar alertas por cron
      description: Endpoint protegido por el header `X-Cron-Secret` en lugar de JWT.
      operationId: cronSendEmails
      security: []
      parameters:
        - name: X-Cron-Secret
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Resultado del envío de correos por cron.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CronSendEmailsResponse'
        '401':
          description: Secreto inválido o ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Cron no configurado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /notifications/rules:
    get:
      tags:
        - Notificaciones
      summary: Listar reglas de notificación
      operationId: listNotificationRules
      responses:
        '200':
          description: Reglas obtenidas.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotificationRuleResponse'
        '401':
          description: No autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Notificaciones
      summary: Crear regla de notificación
      operationId: createNotificationRule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationRuleCreateRequest'
      responses:
        '201':
          description: Regla creada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationRuleResponse'
        '422':
          description: Datos inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /notifications/rules/{rule_id}:
    parameters:
      - name: rule_id
        in: path
        required: true
        schema:
          type: integer
        description: ID de la regla.
    patch:
      tags:
        - Notificaciones
      summary: Actualizar regla de notificación
      operationId: updateNotificationRule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationRuleUpdateRequest'
      responses:
        '200':
          description: Regla actualizada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationRuleResponse'
        '404':
          description: Regla no encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Notificaciones
      summary: Eliminar regla de notificación
      operationId: deleteNotificationRule
      responses:
        '204':
          description: Regla eliminada.
        '404':
          description: Regla no encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /templates/:
    get:
      tags:
        - Plantillas
      summary: Listar plantillas de la organización
      operationId: listTemplates
      parameters:
        - name: document_type
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/DocumentType'
        - name: format_code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TemplateState'
      responses:
