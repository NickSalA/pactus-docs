openapi: 3.0.3
info:
  title: Pactus
  description: 'API para la gestión de contratos, usuarios, plantillas, integraciones y chatbot.'
  version: 1.0.0
  license:
    name: Proprietary - All Rights Reserved
    url: 'https://github.com/NickSalA/Pactus/blob/main/LICENSE'
  contact:
    name: NickSalA
    url: 'https://github.com/NickSalA/Pactus'
    email: contact@example.com
servers:
  - url: 'http://localhost:8000'
    description: Desarrollo local
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - BearerAuth: []
tags:
  - name: Usuarios
    description: Operaciones para el usuario autenticado.
  - name: Chatbot
    description: Operaciones para interactuar con el chatbot.
  - name: Conversaciones
    description: Operaciones para la gestión de conversaciones.
  - name: Documentos
    description: Operaciones para la gestión de documentos.
  - name: Servicios
    description: Catálogo de servicios asociados a documentos.
  - name: Carpetas
    description: Carpetas para organizar documentos.
  - name: Integraciones
    description: Operaciones para la integración con servicios de terceros.
  - name: Facturación
    description: Operaciones de suscripciones y pagos.
  - name: Organizaciones
    description: Operaciones de membresía de la organización actual.
  - name: Notificaciones
    description: 'Operaciones para alertas, correos y reglas de notificación.'
  - name: Plantillas
    description: Operaciones para la gestión y generación de documentos mediante plantillas.
  - name: Dashboards
    description: Endpoints para gráficos y métricas del dashboard.
  - name: Sistema
    description: Operaciones básicas de estado del servidor.
  - name: Auditoría
    description: Endpoints para consultar registros de actividad auditada del sistema.
paths:
  /:
    get:
      tags:
        - Sistema
      summary: Verificar estado del servidor
      operationId: home
      security: []
      responses:
        '200':
          description: Servidor disponible.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  version:
                    type: string
                required:
                  - message
                  - version
  /user/me:
    get:
      summary: Obtener perfil del usuario actual
      description: Retorna la información del usuario autenticado a partir del token Bearer JWT.
      operationId: getMe
      tags:
        - Usuarios
      responses:
        '200':
          description: Perfil del usuario obtenido con éxito.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/paths/~1user~1%7Buser_id%7D/patch/responses/200/content/application~1json/schema'
                  - type: object
                    properties:
                      subscription_active:
                        type: boolean
                    required:
                      - subscription_active
        '401':
          description: No autenticado.
          content:
            application/json:
              schema:
                type: object
                description: Respuesta común de los manejadores de errores del backend.
                properties:
                  error:
                    type: boolean
                    example: true
                  type:
                    type: string
                    description: Nombre de la excepción o categoría del error.
                    example: NotFoundError
                  message:
                    type: string
                    description: Mensaje legible para el consumidor.
                    example: Recurso no encontrado
                  request_id:
                    type: string
                    description: Identificador de la petición para trazabilidad.
                    example: req-7f9c2a1b
                required:
                  - error
                  - type
                  - message
                  - request_id
  '/user/{user_id}':
    parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: integer
        description: ID del usuario.
    patch:
      summary: Actualizar usuario
      description: Actualiza los datos de un usuario. Se usa principalmente para cambiar el rol de un miembro.
      operationId: updateUser
      tags:
        - Usuarios
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum:
                    - SUPERADMIN
                    - ADMIN
                    - HR
                    - MANAGER
                    - WORKER
              required:
                - role
      responses:
        '200':
          description: Usuario actualizado satisfactoriamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  organization_id:
                    type: integer
                  supabase_user_id:
                    type: string
                    format: uuid
                    nullable: true
                  email:
                    type: string
                    format: email
                  full_name:
                    type: string
                    nullable: true
                  avatar_url:
                    type: string
                    nullable: true
                  role:
                    $ref: '#/paths/~1user~1%7Buser_id%7D/patch/requestBody/content/application~1json/schema/properties/role'
                  receives_notifications:
                    type: boolean
                  is_active:
                    type: boolean
                  created_at:
                    type: string
                    format: date-time
                  updated_at:
                    type: string
                    format: date-time
                required:
                  - id
                  - organization_id
                  - email
                  - role
                  - receives_notifications
                  - is_active
                  - created_at
                  - updated_at
        '404':
          description: Usuario no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
    delete:
      summary: Eliminar usuario
      description: Elimina (soft delete) un usuario de la organización.
      operationId: deleteUser
      tags:
        - Usuarios
      responses:
        '204':
          description: Usuario eliminado satisfactoriamente.
        '404':
          description: Usuario no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
  /chatbot/:
    post:
      summary: Enviar mensaje al chatbot
      description: Envía un mensaje al agente RAG y devuelve la respuesta junto al identificador de conversación.
      operationId: sendChatMessage
      tags:
        - Chatbot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                  description: Mensaje del usuario para el chatbot.
                  example: Resume mis contratos activos.
                thread_id:
                  type: integer
                  nullable: true
                  description: 'ID de la conversación existente. Si se omite, el backend crea una nueva conversación.'
                  example: 12
      responses:
        '200':
          description: Respuesta exitosa.
          content:
            application/json:
              schema:
                type: object
                required:
                  - response
                  - thread_id
                properties:
                  response:
                    type: string
                    description: Respuesta generada por el chatbot.
                  thread_id:
                    type: integer
                    description: ID de la conversación.
                    example: 12
                  chart:
                    description: |
                      Datos del gráfico generado por dashboard_chart_tool.
                      Solo presente cuando el usuario solicita una visualización (top services, top companies, loyalty, retention, origin).
                      Estructura compatible con recharts (BarChart, LineChart, PieChart).
                    $ref: '#/paths/~1conversations~1%7Bconversation_id%7D/get/responses/200/content/application~1json/schema/properties/content/items/properties/chart'
        '401':
          description: No autenticado.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
        '422':
          description: Datos de entrada inválidos.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
                  - type: object
                    description: Error de validación producido por FastAPI/Pydantic.
                    properties:
                      type:
                        type: string
                        example: ValidationError
                      message:
                        type: string
                        example: Los datos enviados en la petición no son válidos.
                      details:
                        type: array
                        items:
                          type: string
                        example:
                          - body -> name: Field required
  '/conversations/user/{user_id}':
    parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: integer
        description: ID del usuario propietario de las conversaciones.
    get:
      summary: Listar conversaciones de un usuario
      description: Lista las conversaciones del usuario indicado. El backend rechaza la consulta si el ID no coincide con el usuario autenticado.
      operationId: listUserConversations
      tags:
        - Conversaciones
      responses:
        '200':
          description: Conversaciones obtenidas satisfactoriamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    title:
                      type: string
                    organization_id:
                      type: integer
                    user_id:
                      type: integer
                    created_at:
                      type: string
                      format: date-time
                    updated_at:
                      type: string
                      format: date-time
                  required:
                    - id
                    - title
                    - organization_id
                    - user_id
                    - created_at
                    - updated_at
        '401':
          description: No autenticado.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
        '403':
          description: No tiene permisos para acceder a conversaciones de otro usuario.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
        '500':
          description: Error interno al listar conversaciones.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
        '503':
          description: Persistencia de conversaciones no disponible.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
  '/conversations/{conversation_id}':
    parameters:
      - name: conversation_id
        in: path
        required: true
        schema:
          type: integer
        description: ID de la conversación.
    get:
      summary: Obtener una conversación por ID
      description: Devuelve el historial de mensajes de una conversación específica del usuario autenticado.
      operationId: getConversation
      tags:
        - Conversaciones
      responses:
        '200':
          description: Conversación obtenida satisfactoriamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  title:
                    type: string
                  organization_id:
                    type: integer
                  user_id:
                    type: integer
                  content:
                    type: array
                    items:
                      type: object
                      properties:
                        role:
                          type: string
                          enum:
                            - user
                            - bot
                        content:
                          type: string
                        chart:
                          type: object
                          properties:
                            type:
                              type: string
                              enum:
                                - bar
                                - line
                                - pie
                            layout:
                              type: string
                              enum:
                                - vertical
                                - horizontal
                                - centric
                            title:
                              type: string
                            config:
                              type: object
                              properties:
                                categoryKey:
                                  type: string
                                series:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      dataKey:
                                        type: string
                                      name:
                                        type: string
                                      color:
                                        type: string
                                    required:
                                      - dataKey
                                      - name
                              required:
                                - categoryKey
                                - series
                            data:
                              type: array
                              description: |
                                Arreglo de objetos con llaves dinámicas en inglés. El contenido dependerá de la consulta:
                                * Top Servicios por Monto: { "name": string, "value": number }
                                * Concentración Contratos/Mes: { "month": string, "contracts": number }
                                * Valor Promedio (Multi-serie): { "month": string, "[serviceName]": number }
                                * Concentración de Ingresos (Pie): { "name": string, "value": number }
                                * Concentración de Ingresos (Barras): { "name": string, "percentage": number }
                              items:
                                type: object
                                additionalProperties:
                                  anyOf:
                                    - type: string
                                    - type: number
                          required:
                            - type
                            - layout
                            - title
                            - config
                            - data
                        timestamp:
                          type: string
                          format: date-time
                      required:
                        - role
                        - content
                        - timestamp
                  created_at:
                    type: string
                    format: date-time
                  updated_at:
                    type: string
                    format: date-time
                required:
                  - id
                  - title
                  - organization_id
                  - user_id
                  - content
                  - created_at
                  - updated_at
        '401':
          description: No autenticado.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
        '404':
          description: Conversación no encontrada.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
        '500':
          description: Error interno al obtener la conversación.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
        '503':
          description: Persistencia de conversaciones no disponible.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
    patch:
      summary: Actualizar una conversación
      description: Actualiza el título de una conversación del usuario autenticado.
      operationId: updateConversation
      tags:
        - Conversaciones
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  minLength: 1
                  pattern: .*\S.*
                  description: Nuevo título de la conversación. No puede estar vacío y el backend recorta espacios externos.
              required:
                - title
      responses:
        '200':
          description: Conversación actualizada satisfactoriamente.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1conversations~1%7Bconversation_id%7D/get/responses/200/content/application~1json/schema'
        '401':
          description: No autenticado.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
        '404':
          description: Conversación no encontrada.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
        '409':
          description: Conflicto al actualizar la conversación.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
        '422':
          description: Datos inválidos.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1chatbot~1/post/responses/422/content/application~1json/schema'
        '500':
          description: Error interno al actualizar la conversación.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
        '503':
          description: Persistencia de conversaciones no disponible.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
    delete:
      summary: Eliminar una conversación
      description: Elimina una conversación del usuario autenticado.
      operationId: deleteConversation
      tags:
        - Conversaciones
      responses:
        '204':
          description: Conversación eliminada satisfactoriamente.
        '401':
          description: No autenticado.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
        '404':
          description: Conversación no encontrada.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
        '409':
          description: Conflicto al eliminar la conversación.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
        '500':
          description: Error interno al eliminar la conversación.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
        '503':
          description: Persistencia de conversaciones no disponible.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
  /documents/:
    post:
      summary: Subir un nuevo documento
      description: Recibe un archivo y un campo form-data `document` con JSON serializado para crear el documento. Usa `contract_type` para clasificarlo como COMPANY o LABOR; `type` queda reservado para el origen técnico del documento.
      operationId: createDocument
      tags:
        - Documentos
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                document:
                  type: string
                  description: JSON serializado con la forma de CreateDocumentDraftRequest.
                  example: '{"contract_type":"COMPANY","company_contract":{"client":"Acme S.A.C.","ruc":"20600000001"},"form_data":{"value":1200,"currency":"PEN"}}'
              required:
                - file
      responses:
        '201':
          description: Documento creado satisfactoriamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  type:
                    type: string
                    nullable: true
                    description: Tipo técnico/origen del documento.
                  start_date:
                    type: string
                    format: date
                    nullable: true
                  end_date:
                    type: string
                    format: date
                    nullable: true
                  form_data:
                    type: object
                    additionalProperties: true
                  state:
                    allOf:
                      - type: string
                        enum:
                          - DRAFT
                          - PENDING_SIGNATURE
                          - ACTIVE
                          - EXPIRING_SOON
                          - EXPIRED
                          - TERMINATED
                        description: Estado actual del documento.
                    nullable: true
                  folder_id:
                    type: integer
                    nullable: true
                  file_path:
                    type: string
                    nullable: true
                  file_name:
                    type: string
                    nullable: true
                  service_items:
                    type: array
                    items:
                      allOf:
                        - type: object
                          description: Servicio asociado a un contrato de empresa.
                          properties:
                            service_id:
                              type: integer
                              minimum: 1
                            description:
                              type: string
                              nullable: true
                            value:
                              type: number
                              format: float
                              minimum: 0
                            currency:
                              $ref: '#/paths/~1dashboard~1top_services/get/parameters/0/schema'
                            start_date:
                              type: string
                              format: date
                            end_date:
                              type: string
                              format: date
                          required:
                            - service_id
                            - value
                            - currency
                            - start_date
                            - end_date
                        - type: object
                          properties:
                            id:
                              type: integer
                          required:
                            - id
                  company_contract:
                    allOf:
                      - allOf:
                          - type: object
                            description: Datos específicos de contratos de empresa.
                            properties:
                              ruc:
                                type: string
                                nullable: true
                                description: RUC de la contraparte empresa.
                              client:
                                type: string
                                nullable: true
                                description: Nombre de la contraparte empresa.
                          - type: object
                            properties:
                              id:
                                type: integer
                              document_id:
                                type: integer
                              created_at:
                                type: string
                                format: date-time
                              updated_at:
                                type: string
                                format: date-time
                            required:
                              - id
                              - document_id
                              - created_at
                              - updated_at
                    nullable: true
                  labor_contract:
                    allOf:
                      - allOf:
                          - type: object
                            description: Datos específicos de contratos laborales.
                            properties:
                              worker_name:
                                type: string
                                nullable: true
                              worker_document_number:
                                type: string
                                nullable: true
                              position:
                                type: string
                                nullable: true
                              salary_value:
                                type: number
                                format: float
                                minimum: 0
                                nullable: true
                              salary_currency:
                                allOf:
                                  - $ref: '#/paths/~1dashboard~1top_services/get/parameters/0/schema'
                                nullable: true
                              salary_periodicity:
                                type: string
                                nullable: true
                              contract_modality:
                                type: string
                                nullable: true
                          - type: object
                            properties:
                              id:
                                type: integer
                              document_id:
                                type: integer
                              created_at:
                                type: string
                                format: date-time
                              updated_at:
                                type: string
                                format: date-time
                            required:
                              - id
                              - document_id
                              - created_at
                              - updated_at
                    nullable: true
                  created_at:
                    type: string
                    format: date-time
                  updated_at:
                    type: string
                    format: date-time
                required:
                  - id
                  - created_at
                  - updated_at
        '400':
          description: Datos del documento inválidos.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
        '401':
          description: No autenticado.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
        '422':
          description: Error de validación de FastAPI.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1chatbot~1/post/responses/422/content/application~1json/schema'
    get:
      summary: Listar documentos
      description: Devuelve los documentos visibles para el usuario autenticado.
      operationId: listDocuments
      tags:
        - Documentos
      parameters:
        - name: limit
          in: query
          required: false
          description: Máximo de documentos a retornar.
          schema:
            type: integer
            minimum: 1
            nullable: true
        - name: offset
          in: query
          required: false
          description: Número de documentos a omitir.
          schema:
            type: integer
            minimum: 0
            nullable: true
      responses:
        '200':
          description: Documentos obtenidos satisfactoriamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/paths/~1documents~1/post/responses/201/content/application~1json/schema'
        '401':
          description: No autenticado.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
  '/documents/{document_id}':
    parameters:
      - name: document_id
        in: path
        required: true
        schema:
          type: integer
        description: ID del documento.
    get:
      summary: Obtener un documento por ID
      operationId: getDocument
      tags:
        - Documentos
      responses:
        '200':
          description: Documento obtenido satisfactoriamente.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1documents~1/post/responses/201/content/application~1json/schema'
        '404':
          description: Documento no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
    patch:
      summary: Actualizar un documento
      description: Recibe un campo form-data `document` con JSON serializado y opcionalmente un nuevo archivo. Los datos específicos deben enviarse en `company_contract` o `labor_contract` según el `contract_type`.
      operationId: updateDocument
      tags:
        - Documentos
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
