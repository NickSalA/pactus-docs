  /integrations/drive/import:
    post:
      tags:
        - Integraciones
      summary: Importar archivos de Google Drive en segundo plano
      operationId: importDriveFiles
      description: 'Importa archivos seleccionados manualmente por el usuario desde Google Picker. El token enviado debe tener el scope `https://www.googleapis.com/auth/drive.file`; no se requiere acceso completo de lectura al Drive del usuario.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: object
                  additionalProperties: true
                  description: 'Token OAuth temporal de Google Drive obtenido con el scope `https://www.googleapis.com/auth/drive.file` para archivos seleccionados mediante Google Picker.'
                files:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    properties:
                      file_id:
                        type: string
                        minLength: 1
                      document:
                        description: 'Metadata de creación alineada al endpoint de documentos. Puede incluir `contract_type`, `company_contract` o `labor_contract`.'
                        type: object
                        properties:
                          type:
                            type: string
                            nullable: true
                            description: 'Tipo técnico/origen del documento, por ejemplo manual_upload o template.'
                          contract_type:
                            allOf:
                              - $ref: '#/paths/~1templates~1/get/parameters/0/schema'
                            nullable: true
                            description: Tipo funcional de contrato usado para permisos y clasificación.
                          name:
                            type: string
                            nullable: true
                            deprecated: true
                            description: Campo legacy aceptado durante la transición.
                          client:
                            type: string
                            nullable: true
                            deprecated: true
                            description: Campo legacy aceptado durante la transición.
                          start_date:
                            type: string
                            format: date
                            nullable: true
                          end_date:
                            type: string
                            format: date
                            nullable: true
                          form_data:
                            type: object
                            additionalProperties: true
                            default: {}
                          company_contract:
                            allOf:
                              - $ref: '#/paths/~1documents~1/post/responses/201/content/application~1json/schema/properties/company_contract/allOf/0/allOf/0'
                            nullable: true
                          labor_contract:
                            allOf:
                              - $ref: '#/paths/~1documents~1/post/responses/201/content/application~1json/schema/properties/labor_contract/allOf/0/allOf/0'
                            nullable: true
                          state:
                            allOf:
                              - $ref: '#/paths/~1documents~1/post/responses/201/content/application~1json/schema/properties/state/allOf/0'
                            nullable: true
                          folder_id:
                            type: integer
                            minimum: 1
                            nullable: true
                          service_items:
                            type: array
                            description: Servicios asociados al contrato de empresa. No aplica para contratos laborales.
                            items:
                              $ref: '#/paths/~1documents~1/post/responses/201/content/application~1json/schema/properties/service_items/items/allOf/0'
                            default: []
                    required:
                      - file_id
                    example:
                      file_id: google-drive-file-id
                      document:
                        contract_type: COMPANY
                        company_contract:
                          client: Acme S.A.C.
                          ruc: '20600000001'
                        form_data:
                          value: 1200
                          currency: PEN
              required:
                - token
                - files
      responses:
        '200':
          description: Importación iniciada.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  queued_files:
                    type: integer
                  index_name:
                    type: string
                  job_id:
                    type: string
                    format: uuid
                required:
                  - message
                  - queued_files
                  - index_name
                  - job_id
        '401':
          description: No autenticado.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
        '403':
          description: No tiene permisos para importar este tipo de contrato.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
        '409':
          description: Ya existe una importación en progreso. Espere a que termine.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
        '422':
          description: Datos inválidos.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1chatbot~1/post/responses/422/content/application~1json/schema'
  '/integrations/drive/import/{job_id}/events':
