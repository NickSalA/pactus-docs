                    type: string
                    nullable: true
                  city:
                    type: string
                    nullable: true
                  autorizacion_entidad:
                    type: string
                    nullable: true
                  autorizacion_fecha:
                    type: string
                    format: date
                    nullable: true
                  autorizacion_emitida_por:
                    type: string
                    nullable: true
                  email:
                    type: string
                    format: email
