  /templates/drafts:
    post:
      tags:
        - Plantillas
      summary: Generar y guardar borrador de plantilla
      description: |
        Genera una nueva plantilla (en estado DRAFT) de forma dinámica, utilizando un archivo de base (ej. PDF/Word). 
        El backend procesa este archivo y extrae automáticamente la estructura, el texto y las variables clave del contrato, creando los `fields` de la plantilla.

        El resultado en `content.body_md` incluirá referencias a variables (ej. `{{ representante_cargo }}`). 
        En `content.fields` encontrarás el listado dinámico de los campos detectados, listos para ser utilizados por el frontend para renderizar un formulario. 
        Además, la respuesta contiene los detalles de la extracción en el objeto `source` y cualquier advertencia en `warnings`.
      operationId: generateTemplateDraft
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  nullable: true
                request:
                  type: string
                  description: JSON serializado con la forma de GenerateTemplateDraftRequest.
                  example: '{"name": "Mi Contrato", "format_code": "management"}'
              required:
                - request
      responses:
        '201':
          description: Borrador generado y persistido.
          content:
            application/json:
              schema:
                type: object
                properties:
                  template:
                    $ref: '#/paths/~1templates~1%7Btemplate_id%7D/get/responses/200/content/application~1json/schema'
                  warnings:
                    type: array
                    items:
                      type: string
                  source:
                    type: object
                    additionalProperties: true
                  usage:
                    allOf:
                      - type: object
                        properties:
                          input_tokens:
                            type: integer
                            default: 0
                          output_tokens:
                            type: integer
                            default: 0
                          total_tokens:
                            type: integer
                            default: 0
                    nullable: true
                required:
                  - template
                  - warnings
                  - source
                  - usage
                example:
                  template:
                    id: 72
                    organization_id: 2
                    name: Mi Primer Contrato
                    description: Contrato de prueba
                    document_type: COMPANY
                    template_format_id: 1
                    format_code: management
                    format_label: Contrato de Management
                    content:
                      body_md: |-
                        ## CONTRATO DE MANAGEMENT

                        Conste por el presente documento...
                      fields:
                        - key: representante_cargo
                          label: Cargo del representante
                          type: text
                          required: true
                          placeholder: Ej. Gerente General
                      operational_fields: []
                      version: '1.0'
                      contract_date_mapping:
                        start_date_field: fecha_inicio_contrato
                        end_date_field: fecha_fin_contrato
                    created_at: '2026-05-18T01:18:08.619Z'
                    state: DRAFT
                  warnings:
                    - 'Cláusulas de referencia no preservadas: CUARTA, QUINTA, SEXTA...'
                  source:
                    mode: file_reference
                    filename: contrato 003.pdf
                    generation_mode: adaptive
                    reference_mode: compact
                    detected_document_type: COMPANY
                    clause_count: 10
                  usage:
                    input_tokens: 3268
                    output_tokens: 9284
                    total_tokens: 12552
        '400':
          description: Payload inválido.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
