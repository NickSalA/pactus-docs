  /billing/paypal/subscriptions/confirm:
    post:
      summary: Confirmar suscripción PayPal
      description: |
        Valida una suscripción aprobada en PayPal usando su subscription_id, crea una organización placeholder y registra como ADMIN al correo usado en el checkout. Este endpoint es público porque se ejecuta antes del inicio de sesión; no acepta organization_id desde el cliente.
      operationId: confirmPayPalSubscription
      tags:
        - Facturación
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                subscription_id:
                  type: string
                  minLength: 6
                  maxLength: 128
                  description: ID de la suscripción aprobada por PayPal.
                  example: I-6Y983831YP445233M
                email:
                  type: string
                  format: email
                  description: Correo ingresado durante el checkout. Debe coincidir con el custom_id registrado en PayPal.
                  example: admin@empresa.com
              required:
                - subscription_id
                - email
      responses:
        '201':
          description: Suscripción confirmada y organización provisionada satisfactoriamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  organization_id:
                    type: integer
                    description: ID de la organización placeholder creada o ya provisionada para la suscripción.
                    example: 123
                  admin_email:
                    type: string
                    format: email
                    description: Correo del usuario administrador creado para la organización.
                    example: admin@empresa.com
                  paypal_subscription_id:
                    type: string
                    description: ID de la suscripción PayPal guardada en la organización.
                    example: I-6Y983831YP445233M
                required:
                  - organization_id
                  - admin_email
                  - paypal_subscription_id
        '400':
          description: 'La suscripción de PayPal no existe, no contiene los datos esperados o el correo no coincide.'
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
        '409':
          description: La suscripción o el correo ya fueron registrados.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
        '422':
          description: Payload inválido.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1chatbot~1/post/responses/422/content/application~1json/schema'
        '502':
          description: PayPal devolvió una respuesta inesperada.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
        '503':
          description: PayPal no está configurado en el backend.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1user~1me/get/responses/401/content/application~1json/schema'
