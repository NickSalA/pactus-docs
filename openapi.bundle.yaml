components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UserRole:
      type: string
      enum:
        - ADMIN
        - HR
        - MANAGER
        - WORKER
    UserResponse:
      type: object
      properties:
        id:
          type: integer
        organization_id:
          type: integer
        supabase_user_id:
          type: string
          format: uuid
          nullable: true
        email:
          type: string
          format: email
        full_name:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
        role:
          $ref: '#/components/schemas/UserRole'
        receives_notifications:
          type: boolean
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - organization_id
        - supabase_user_id
        - email
        - full_name
        - avatar_url
        - role
        - receives_notifications
        - is_active
        - created_at
        - updated_at
    ErrorResponse:
      type: object
      description: Respuesta común de los manejadores de errores del backend.
      properties:
        error:
          type: boolean
          example: true
        type:
          type: string
          description: Nombre de la excepción o categoría del error.
          example: NotFoundError
        message:
          type: string
          description: Mensaje legible para el consumidor.
          example: Recurso no encontrado
        request_id:
          type: string
          description: Identificador de la petición para trazabilidad.
          example: req-7f9c2a1b
      required:
        - error
        - type
        - message
        - request_id
    ChatRequest:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Mensaje del usuario para el chatbot.
          example: Resume mis contratos activos.
        thread_id:
          type: integer
          nullable: true
          description: ID de la conversación existente. Si se omite, el backend crea una nueva conversación.
          example: 12
    ChatResponse:
      type: object
      required:
        - response
        - thread_id
      properties:
        response:
          type: string
          description: Respuesta generada por el chatbot.
        thread_id:
          type: integer
          description: ID de la conversación.
          example: 12
    ValidationError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          description: Error de validación producido por FastAPI/Pydantic.
          properties:
            type:
              type: string
              example: ValidationError
            message:
              type: string
              example: Los datos enviados en la petición no son válidos.
            details:
              type: array
              items:
                type: string
              example:
                - body -> name: Field required
    ConversationList:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        organization_id:
          type: integer
        user_id:
          type: integer
        created_at:
          type: string
          format: date-time
      required:
        - id
        - title
        - organization_id
        - user_id
        - created_at
    ConversationMessage:
      type: object
      properties:
        role:
          type: string
          enum:
            - user
            - bot
        content:
          type: string
        timestamp:
          type: string
          format: date-time
      required:
        - role
        - content
        - timestamp
    ConversationRead:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        organization_id:
          type: integer
        user_id:
          type: integer
        content:
          type: array
          items:
            $ref: '#/components/schemas/ConversationMessage'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - title
        - organization_id
        - user_id
        - content
        - created_at
        - updated_at
    DocumentState:
      type: string
      enum:
        - DRAFT
        - PENDING_SIGNATURE
        - ACTIVE
        - EXPIRING_SOON
        - EXPIRED
        - TERMINATED
      description: Estado actual del documento.
    CurrencyType:
      type: string
      enum:
        - PEN
        - USD
        - EUR
    DocumentServiceItemRequest:
      type: object
      description: Servicio asociado a un contrato de empresa.
      properties:
        service_id:
          type: integer
          minimum: 1
        description:
          type: string
          nullable: true
        value:
          type: number
          format: float
          minimum: 0
        currency:
          $ref: '#/components/schemas/CurrencyType'
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
      required:
        - service_id
        - value
        - currency
        - start_date
        - end_date
    DocumentServiceItemResponse:
      allOf:
        - $ref: '#/components/schemas/DocumentServiceItemRequest'
        - type: object
          properties:
            id:
              type: integer
          required:
            - id
    CompanyContractRequest:
      type: object
      description: Datos específicos de contratos de empresa.
      properties:
        ruc:
          type: string
          nullable: true
          description: RUC de la contraparte empresa.
        client:
          type: string
          nullable: true
          description: Nombre de la contraparte empresa.
    CompanyContractResponse:
      allOf:
        - $ref: '#/components/schemas/CompanyContractRequest'
        - type: object
          properties:
            id:
              type: integer
            document_id:
              type: integer
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
          required:
            - id
            - document_id
            - created_at
            - updated_at
    LaborContractRequest:
      type: object
      description: Datos específicos de contratos laborales.
      properties:
        worker_name:
          type: string
          nullable: true
        worker_document_number:
          type: string
          nullable: true
        position:
          type: string
          nullable: true
        salary_value:
          type: number
          format: float
          minimum: 0
          nullable: true
        salary_currency:
          allOf:
            - $ref: '#/components/schemas/CurrencyType'
          nullable: true
        salary_periodicity:
          type: string
          nullable: true
        contract_modality:
          type: string
          nullable: true
    LaborContractResponse:
      allOf:
        - $ref: '#/components/schemas/LaborContractRequest'
        - type: object
          properties:
            id:
              type: integer
            document_id:
              type: integer
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
          required:
            - id
            - document_id
            - created_at
            - updated_at
    DocumentResponse:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          nullable: true
          description: Tipo técnico/origen del documento.
        start_date:
          type: string
          format: date
          nullable: true
        end_date:
          type: string
          format: date
          nullable: true
        form_data:
          type: object
          additionalProperties: true
        state:
          allOf:
            - $ref: '#/components/schemas/DocumentState'
          nullable: true
        folder_id:
          type: integer
          nullable: true
        file_path:
          type: string
          nullable: true
        file_name:
          type: string
          nullable: true
        service_items:
          type: array
          items:
            $ref: '#/components/schemas/DocumentServiceItemResponse'
        company_contract:
          allOf:
            - $ref: '#/components/schemas/CompanyContractResponse'
          nullable: true
        labor_contract:
          allOf:
            - $ref: '#/components/schemas/LaborContractResponse'
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - created_at
        - updated_at
    DocumentListResponse:
      type: array
      items:
        $ref: '#/components/schemas/DocumentResponse'
    DocumentMultipartCreateRequest:
      type: object
      properties:
        file:
          type: string
          format: binary
        document:
          type: string
          description: JSON serializado con la forma de CreateDocumentDraftRequest.
          example: '{"contract_type":"COMPANY","company_contract":{"client":"Acme S.A.C.","ruc":"20600000001"},"form_data":{"value":1200,"currency":"PEN"}}'
      required:
        - file
    DocumentMultipartUpdateRequest:
      type: object
      properties:
        file:
          type: string
          format: binary
          nullable: true
        document:
          type: string
          description: JSON serializado con campos parciales de UpdateDocumentRequest.
          example: '{"contract_type":"LABOR","labor_contract":{"worker_name":"Ana Perez","position":"Analista"}}'
      required:
        - document
    DocumentFileUrlResponse:
      type: object
      properties:
        url:
          type: string
          format: uri
      required:
        - url
    ServiceResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        is_active:
          type: boolean
        documents_count:
          type: integer
          default: 0
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - is_active
        - documents_count
        - created_at
        - updated_at
    ServiceListResponse:
      type: array
      items:
        $ref: '#/components/schemas/ServiceResponse'
    ServiceCreateRequest:
      type: object
      properties:
        name:
          type: string
        is_active:
          type: boolean
          default: true
      required:
        - name
    ServiceUpdateRequest:
      type: object
      minProperties: 1
      properties:
